l_simp_chinese:
 nick_the_mount_hua_sword_sage:0 "华山剑圣"
 nick_the_mount_hua_sword_sage_desc:0 "一位被同辈公认为华山活着的剑圣的高阶强者。"
 nick_the_heavenly_sword_lord:0 "天剑主"
 nick_the_heavenly_sword_lord_desc:0 "他们的剑意如天剑般直冲云霄。"
 nick_the_ten_thousand_blades:0 "万刃"
 nick_the_ten_thousand_blades_desc:0 "他们的剑术绽放出无数杀戮之刃，如同雨点般落下。"
 nick_the_violet_thunder_blade:0 "紫雷之刃"
 nick_the_violet_thunder_blade_desc:0 "他们的剑光如同紫色的天雷般噼啪作响。"
 nick_the_nine_star_array_master:0 "九星阵大师"
 nick_the_nine_star_array_master_desc:0 "一位擅长使用星光法则束缚敌人的大型阵法专家。"
 nick_the_mystic_seal_warden:0 "神秘封印守护者"
 nick_the_mystic_seal_warden_desc:0 "一位以辟邪符咒和封印术闻名的护法学者。"
 nick_the_wudang_trueperson:0 "武当真人"
 nick_the_wudang_trueperson_desc:0 "一位道家高手，阴阳平衡近乎完美。"
 nick_the_shaolin_vajra:0 "少林金刚杵"
 nick_the_shaolin_vajra_desc:0 "身心如金刚杵般坚韧，面对逆境毫不动摇。"
 nick_the_eternal_harmony_master:0 "永恒和谐大师"
 nick_the_eternal_harmony_master_desc:0 "一位修炼者，将气与心合一，达到完美的宁静状态。"
 nick_the_divine_beast_tamer:0 "神兽驯兽师"
 nick_the_divine_beast_tamer_desc:0 "他们与灵兽签订的契约在江湖各地都受到尊重。"
 nick_the_thousand_beast_sovereign:0 "千兽之主"
 nick_the_thousand_beast_sovereign_desc:0 "野性灵脉与原始兽潮的主宰。"
 nick_the_crimson_moon_blade:0 "绯红之月之刃"
 nick_the_crimson_moon_blade_desc:0 "他们的剑道沿着血红的月光和无情的势头前进。"
 nick_the_tyrant_saber_overlord:0 "暴君剑霸"
 nick_the_tyrant_saber_overlord_desc:0 "一位意志坚定的暴君，凭借武力征服对手。"
 nick_the_demon_suppressing_edge:0 "灭魔之刃"
 nick_the_demon_suppressing_edge_desc:0 "一位令人闻风丧胆的刀锋使用者，专门斩杀邪恶的修仙者。"
 nick_the_medicine_king:0 "药王"
 nick_the_medicine_king_desc:0 "一位举世闻名的炼金术权威，以神奇的药丸和疗法而闻名。"
 nick_the_hundred_herbs_alchemist:0 "百草炼金术士"
 nick_the_hundred_herbs_alchemist_desc:0 "一位植物学家兼炼金术士，能够将珍稀草药提炼成神奇的灵药。"
 nick_the_jade_chamber_enchantress:0 "玉室女巫"
 nick_the_jade_chamber_enchantress_desc:0 "一位魅力四射的道家，其迷人的外表下隐藏着恐怖的灵力。"
 nick_the_eternal_serenity_master:0 "永恒宁静大师"
 nick_the_eternal_serenity_master_desc:0 "他们平静的心灵就像平静的湖面，能够映照和化解敌意。"
 nick_the_moonless_night_revenant:0 "无月之夜的亡灵"
 nick_the_moonless_night_revenant_desc:0 "一位在月光无法照耀的地方茁壮成长的暗道修士。"
 nick_the_pale_bone_necromancer:0 "苍白骨亡灵法师"
 nick_the_pale_bone_necromancer_desc:0 "一位冷酷无情的僵尸大师，能够以令人毛骨悚然的精准度操控尸体和骨骼。"
 nick_the_eternal_rest_keeper:0 "永恒安息守护者"
 nick_the_eternal_rest_keeper_desc:0 "一位掌管死亡技艺的守护者，行走于鲜活的生命气息与冰冷的寂静之间。"
 nick_the_ten_thousand_corpse_lord:0 "万尸之主"
 nick_the_ten_thousand_corpse_lord_desc:0 "臭名昭著的尸道霸主，身后萦绕着葬礼的瘴气。"
 nick_the_venomous_serpent_sovereign:0 "毒蛇君主"
 nick_the_venomous_serpent_sovereign_desc:0 "他们的毒术如同毒蛇般盘旋攻击——迅猛而致命。"
 nick_the_blood_yin_ancestor:0 "血阴祖师"
 nick_the_blood_yin_ancestor_desc:0 "一位拥有血脉和月之精华的长老，他的手段令人畏惧。"
 nick_the_heavenly_demon:0 "天魔"
 nick_the_heavenly_demon_desc:0 "一个恐怖的魔族化身，他的道竟敢吞噬苍穹。"
 nick_the_nightshade_tempter:0 "茄科诱惑者"
 nick_the_nightshade_tempter_desc:0 "来自禁忌双修传统的灵魂束缚诱惑者。"
 nick_the_lone_wolf_immortal:0 "孤狼不朽"
 nick_the_lone_wolf_immortal_desc:0 "一位游方仙人，不向任何山门低头。"
 nick_the_vagrant_blade_brother:0 "流浪刀锋兄弟"
 nick_the_vagrant_blade_brother_desc:0 "一位在街头历练而成的剑客，以忠诚和果断著称。"
 nick_the_thousand_treasures_curator:0 "千宝馆长"
 nick_the_thousand_treasures_curator_desc:0 "一位文物鉴赏家，他能唤醒古代文物中沉睡的灵魂。"
 nick_the_mystic_forge_artificer:0 "神秘锻造工匠"
 nick_the_mystic_forge_artificer_desc:0 "一位传奇铁匠，他的作品能够改变战场上的命运。"
 nick_the_ancient_relic_seeker:0 "古代遗物搜寻者"
 nick_the_ancient_relic_seeker_desc:0 "一位拥有超凡寻宝直觉的废墟漫步者。"
 nick_the_primal_beast_lord:0 "原始兽王"
 nick_the_primal_beast_lord_desc:0 "一位与凶猛的灵兽和野性本能紧密相连的猎人领主。"
 nick_the_primordial_chaos_ascendant:0 "原始混沌升腾者"
 nick_the_primordial_chaos_ascendant_desc:0 "一位修炼拥抱创世之初动荡的混沌道圣者。"
 nick_the_feral_bond_master:0 "野性契约大师"
 nick_the_feral_bond_master_desc:0 "一位兽灵缔结专家，他的同伴们会像一个整体一样行动。"

 nick_the_river_wanderer:0 "河流漫游者"
 nick_the_river_wanderer_desc:0 "一位在渡口和河边客栈都颇有名气的游方耕耘者。"
 nick_the_cloud_sword:0 "云剑"
 nick_the_cloud_sword_desc:0 "它们的刀刃运动轻盈飘逸，却难以辨认。"
 nick_the_jade_mantis:0 "玉螳螂"
 nick_the_jade_mantis_desc:0 "一位以精准、如昆虫般切割而闻名的迅猛射手。"
 nick_the_bamboo_shadow:0 "竹影"
 nick_the_bamboo_shadow_desc:0 "它们行踪诡秘，沉着冷静，在发动攻击前会消失在树林中。"
 nick_the_iron_palm:0 "铁砂掌"
 nick_the_iron_palm_desc:0 "拥有能劈开石头、折断武器的坚韧双手。"
 nick_the_broken_spear:0 "断矛"
 nick_the_broken_spear_desc:0 "一个顽强的斗士，将毁灭和挫折转化为勇猛的斗志。"
 nick_the_mountain_fox:0 "山狐"
 nick_the_mountain_fox_desc:0 "聪明、耐心，而且在高空传球中很难被拦截。"
 nick_the_white_crane:0 "白鹤"
 nick_the_white_crane_desc:0 "优雅的步法和流畅的长击是他们的风格特色。"
 nick_the_ember_adept:0 "余烬使者"
 nick_the_ember_adept_desc:0 "一位实力较弱的火焰修炼者，他的气不是熊熊燃烧，而是暗淡燃烧。"
 nick_the_frost_edge:0 "霜刃"
 nick_the_frost_edge_desc:0 "他们的杀意冷酷而果断，如同凛冬之钢。"
 nick_the_silent_qi:0 "寂静之气"
 nick_the_silent_qi_desc:0 "即使在近距离内，也很难察觉到它们的存在。"
 nick_the_drunk_blade:0 "醉刃"
 nick_the_drunk_blade_desc:0 "一位行踪诡秘的剑客，他摇摇晃晃的姿态掩盖了致命的时机把握。"
 nick_the_hidden_talisman:0 "隐藏的护身符"
 nick_the_hidden_talisman_desc:0 "一位务实的符咒使用者，总是会多留一枚符咒备用。"
 nick_the_night_reed:0 "夜芦苇"
 nick_the_night_reed_desc:0 "一个在黄昏中徘徊的游荡者，他弯腰、生存，并在黑暗中重新振作。"
 nick_the_wind_stepper:0 "风行者"
 nick_the_wind_stepper_desc:0 "以轻盈的技巧和不可能的追求而闻名。"
 nick_the_stone_heart:0 "石心"
 nick_the_stone_heart_desc:0 "一位意志坚定的修行者，默默忍受艰辛而不抱怨。"
 nick_the_lotus_watcher:0 "莲花守望者"
 nick_the_lotus_watcher_desc:0 "耐心观察人、事、物。"
 nick_the_red_cinnabar:0 "红朱砂"
 nick_the_red_cinnabar_desc:0 "一位以炼制药效惊人的丹药而闻名的小规模炼丹术从业者。"
 nick_the_ghost_lantern:0 "幽灵灯笼"
 nick_the_ghost_lantern_desc:0 "他们苍白的气息和诡异的气功让他们的出现令人不安。"
 nick_the_swamp_viper:0 "沼泽蝰蛇"
 nick_the_swamp_viper_desc:0 "一个心怀恶意、冷酷无情的流氓修仙者。"
 nick_the_reincarnator:0 "转世者"
 nick_the_reincarnator_desc:0 "一个逆天而行的灵魂带着前世的记忆和惊人的修炼天赋重返人间。"
 nick_the_jianghu_hegemon:0 "江湖霸主"
 nick_the_jianghu_hegemon_desc:0 "他们连续十年占据江湖最强石碑榜首，被公认为是这个时代最伟大的修士。"
