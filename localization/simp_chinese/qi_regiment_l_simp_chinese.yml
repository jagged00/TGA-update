l_simp_chinese:

thousand_qi_needles:0 "千气针"
thousand_qi_needles_flavor:0 "#F 衣袖一甩，千道凝结的气针从修士体内呼啸而出，将天空化作一场致命的无形穿刺之光风暴，撕裂阵法，摧毁军队。这是踏入聚气境者的标志性显现。#!"

nine_heavens_sword_intent:0 "九重天剑意"
nine_heavens_sword_intent_flavor:0 "一道绝世剑意——九重天间凝聚的纯粹真气——撕裂虚空。山岳被劈开，江河奔涌而上，万物都在这筑基期修士顿悟所诞生的绝对真气领域面前颤抖。"

golden_core_flame_lotus:0 "金芯焰莲"
golden_core_flame_lotus_flavor:0 "#F 金丹在丹田内疯狂旋转，孕育出一朵不朽的九瓣火焰莲花，悬浮于战场之上。凡是它触及之物——钢铁、石头或血肉——都会被不灭的金火化为飘浮的灰烬。#!"

nascent_soul_phantom:0 "新生灵魂幻影"
nascent_soul_phantom_flavor:0 "#F 元婴脱离本体，化作千丈巨神，一掌遮天，一步跨千里；天地万物皆臣服于元婴界的至高威势之下。#!"

heaven_severing_blade:0 "断天之刃"
heaven_severing_blade_flavor:0 "一道纯粹的真气横斩，形似斩天利刃，斩断天地之连。苍穹裂开，仙人身首异处，就连道法本身也被斩魂修士那无与伦比的意志撕裂。"

myriad_dao_suppression_domain:0 "万道压制域"
myriad_dao_suppression_domain_flavor:0 "#F 在这绝对领域内，万道皆被强行压制。所有技艺失效，所有灵力消散，所有敌人都在寻求真道者的巨大压力下沦为无力的凡人。#!"

heavenly_tribulation_descent:0 "天劫降临"
heavenly_tribulation_descent_flavor:0 "#F 曾经考验飞升者的忿怒劫雷，如今听命于他们。无尽的紫黑色毁灭之雷从裂开的天穹倾泻而下，惩罚所有胆敢违抗已证得不朽飞升者之人。#!"