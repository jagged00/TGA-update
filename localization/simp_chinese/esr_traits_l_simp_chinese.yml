  trait_esr_social_standing_neutral:0 "社会人物"
  trait_esr_social_standing_good:0 "人脉广泛"
  trait_esr_social_standing_bad:0 "社会弃儿"
  trait_esr_social_standing_mixed:0 "褒贬不一"
  trait_track_esr_well_connected:0 "社交联系"
  trait_track_esr_well_connected_desc:0 "就像城堡大厅里精美的挂毯一样，一颗高尚的心编织着无数的联系，为人生旅程增添了丰富和欢乐。"
  trait_track_esr_popular_among_peers:0 "同龄人中的受欢迎程度"
  trait_track_esr_popular_among_peers_desc:0 "当封臣的声望响彻宫廷时，一位警惕的君主不仅会关注响亮的赞扬声，也会关注窃窃私语的担忧。"
  trait_track_esr_friends_in_high_places:0 "高层朋友"
  trait_track_esr_friends_in_high_places_desc:0 "与杰出的朋友在一起，自己的命运也会随之提升，因为在权力和影响力的殿堂里，通往尚未探索的机会的大门敞开着。"
  trait_track_esr_social_pariah:0 "来自竞争对手的诽谤"
  trait_track_esr_social_pariah_desc:0 "来自强大敌人的恶毒言语，诽谤毒害人心，玷污名誉，在捍卫真理的太阳落山后，留下的阴影依然挥之不去。"
  trait_esr_social_standing_neutral_desc:0 "[ROOT.GetCharacter.GetFirstNamePossessiveNoTooltip]朋友和敌人正以多种方式影响着我们的生活。[ROOT.Char.GetSheHe]已经做好了。"
  trait_esr_social_standing_good_desc:0 "[ROOT.GetCharacter.GetFirstNamePossessiveNoTooltip]建立稳固的社交圈[ROOT.Char.GetHerHis]外交和阴谋活动变得不那么艰辛。"
  trait_esr_social_standing_bad_desc:0 "正在讲述的故事[ROOT.GetCharacter.GetFirstNamePossessiveNoTooltip]许多强大的敌人都对……进行了负面描述。[ROOT.Char.GetHerHis]不管他们说的话是否属实，很难不畏惧那些敢于触怒当权者的人。"
  trait_esr_social_standing_mixed_desc:0 "[ROOT.GetCharacter.GetFirstNamePossessiveNoTooltip]名字对不同的人来说意味着很多不同的东西。问得越多，就越能看出……[ROOT.Char.GetHerHim]他们就越会感到困惑。[ROOT.GetCharacter.GetFirstNamePossessiveNoTooltip] 特点。 "

