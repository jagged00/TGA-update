l_simp_chinese:
 claim_heavenly_mandate_vassal_title:0 "宣称拥有天命"
 claim_heavenly_mandate_vassal_desc:0 "你的修为已臻至极致，凡间等级制度已不再束缚你。夺取天命，让命运承认你统治的合法性。"
 claim_heavenly_mandate_vassal_confirm:0 "天庭可以作证。"
 claim_heavenly_mandate_vassal_tooltip:0 "获得[GetTrait('conqueror').GetName(GetNullCharacter)]特质以及对领主主要头衔的有力主张。"

 claim_heavenly_mandate_independent_title:0 "宣扬天命"
 claim_heavenly_mandate_independent_desc:0 "作为一位独立自主的修真领主，你的意志就是你的法则。宣告你的旨意，让所有世界都知道你的使命是征服。"
 claim_heavenly_mandate_independent_confirm:0 "我的权力是绝对的。"
 claim_heavenly_mandate_independent_tooltip:0 "获得[GetTrait('conqueror').GetName(GetNullCharacter)]特征。"

 claim_superior_realm_liege_title:0 "确立至高无上的王国权威"
 claim_superior_realm_liege_desc:0 "你的君主远不及你的成就。天理之下，权力高于头衔；去夺回本该属于你的东西吧。"
 claim_superior_realm_liege_confirm:0 "弱者无法指挥强者。"
 claim_superior_realm_liege_tooltip:0 "取得对领主主要头衔的正式继承权。"

awaken_meridian_disciples_decision:0 "觉醒经脉门徒"
awaken_meridian_disciples_decision_desc:0 "聚集那些觉醒了经络潜能的人，引导他们进行聚气，用新的弟子壮大你的宫廷和领域。"
awaken_meridian_disciples_decision_confirm:0 "打开他们的经络。"
awaken_meridian_disciples_tooltip:0 "具备经脉特质的合格廷臣和封臣从齐聚开始。"

cleanse_remnant_sects_decision:0 "清除残余教派"
cleanse_remnant_sects_decision_desc:0 "清除你直属领地中残留的宗派影响，并将你的领地与你当前的修炼信仰保持一致。附庸领地保持不变，但你原宗派的附庸会对此次清洗行动感到不满。"
cleanse_remnant_sects_decision_confirm:0 "肃清残余教派。"
cleanse_remnant_sects_decision_tooltip:0 "只将你直接控制的伯爵领皈依你的信仰，激怒那些仍然信奉你原教派的封臣。"

remnant_sect_purged_opinion:0 "清除我教派的影响"
despises_weak_liege_cultivation_opinion:0 "凌驾于其君主之上的领域"
cultivation_views_me_as_future_threat_opinion:0 "视我为未来威胁"
cultivation_invests_in_my_talent_opinion:0 "投资于我的才能"
orthodox_realm_insight:0 "东正教领域洞察"
orthodox_realm_insight_desc:0 "严谨的经文研习能够磨砺修行者的道心，并稳定其境界。"
unorthodox_realm_insight:0 "非正统的领域洞察"
unorthodox_realm_insight_desc:0 "在充满竞争与突破的刀锋之路上，这位修士磨练出了敏锐的战斗本能。"
demonic_realm_insight:0 "魔界洞察"
demonic_realm_insight_desc:0 "残酷的手段和禁忌的技艺将每一次突破都转化为可怕的杀意。"
vagrant_realm_insight:0 "流浪者领域洞察"
vagrant_realm_insight_desc:0 "游历江湖拓宽了这位耕耘者的视野和适应能力。"
divine_beast_spirit_companion:0 "灵兽伙伴"
divine_beast_spirit_companion_desc:0 "一只与修士缔结契约的灵兽在修士身边战斗，磨练其体魄和战斗反应。"
wudang_taiji_harmony:0 "太极和谐"
wudang_taiji_harmony_desc:0 "武当平衡化解外力，稳固道心。"
jade_chamber_alluring_presence:0 "迷人的存在"
jade_chamber_alluring_presence_desc:0 "玉室艺术融合了魅力与修为，既吸引了盟友，也吸引了仰慕者。"
blood_moon_killing_intent:0 "血月杀意"
blood_moon_killing_intent_desc:0 "魔月将这位修士淬炼成恐怖的掠食者。"
ancient_relic_treasure_resonance:0 "宝藏共鸣"
ancient_relic_treasure_resonance_desc:0 "古老的遗物之气在这位修士体内回荡，增强了他对财富和知识的掌控力。"

jianghu_oath_gathering_decision:0 "召开江湖结盟大会"
jianghu_oath_gathering_decision_desc:0 "邀请浪人剑客、宗门使者、炼丹师和浪人修士来到你的宫廷。在酒酣耳热之际，在隐晦的吹嘘中，他们立下誓言，衡量彼此间的竞争，你的名字也将传遍江湖。"
jianghu_oath_gathering_decision_confirm:0 "让江湖来见证我。"
jianghu_oath_gathering_decision_tooltip:0 "尝试举办一场真正的[GetActivityType('activity_tournament').GetName]作为江湖武林盛会，成功后可获得宗门资源和声望。此技能冷却时间为5年。"

purge_mortal_afflictions_decision:0 "清除致命的苦难"
purge_mortal_afflictions_decision_desc:0 "通过使精炼的气在每条经络和器官中循环，你可以驱除致命疾病，稳定身体，并修复足以使普通人瘫痪的顽固伤痛。"
purge_mortal_afflictions_decision_confirm:0 "让气在每条经络中循环。"
purge_mortal_afflictions_decision_tooltip:0 "需要至少患有一种重大疾病或受伤。清除负面状态，缓解压力，并进入为期1个月的冷却期。"
mentor_guidance_opinion:0 "导师指导"
lineage_betrayal_opinion:0 "血统背叛"
