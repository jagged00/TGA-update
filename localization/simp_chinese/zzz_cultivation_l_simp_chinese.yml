 #######################
 ## CULTIVATION PATH TENETS
 #######################

 # Orthodox Cultivation
 tenet_orthodox_cultivation:0 "正统教养"
 tenet_orthodox_cultivation_desc:0 "此宗派奉行正道：严守戒律，恪守因果报应，坚持师徒正统，坦诚面对冲突。其弟子在江湖中珍视荣誉、克制与合法性。"
 tenet_orthodox_cultivation_name:0 "正统之路"

 # Unorthodox Cultivation
 tenet_unorthodox_cultivation:0 "非正统的耕作方式"
 tenet_unorthodox_cultivation_desc:0 "这个教派追求非传统的继承方式和非常规的做法，而这些做法为正统长老所谴责。他们本身并非邪恶，但他们重视结果、创新和抓住机会取得突破。"
 tenet_unorthodox_cultivation_name:0 "非正统之路"

 # Demonic Cultivation
 tenet_demonic_cultivation:0 "魔道修炼"
 tenet_demonic_cultivation_desc:0 "这个教派信奉禁忌的吞噬、献祭和邪恶炼化之术。权力并非与生俱来，而是靠夺取；恐惧是一种资源；每一次突破都可能带来更深的业力腐蚀。"
 tenet_demonic_cultivation_name:0 "恶魔之路"

 # Vagrant Cultivation
 tenet_vagrant_cultivation:0 "流浪栽培"
 tenet_vagrant_cultivation_desc:0 "这个宗派奉行游方之道，融合了多种传承的碎片，却不拘泥于任何单一的正统教义。其修士凭借适应能力、决斗技巧和来之不易的实战经验生存下来。"
 tenet_vagrant_cultivation_name:0 "流浪之路"

