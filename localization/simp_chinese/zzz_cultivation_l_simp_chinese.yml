 #######################
 ## BREAKTHROUGH EVENTS - MAIN CHOICES
 #######################

 # Qi Gathering (1000-1002)
 cultivation_breakthrough.1000.t:0 "气聚集突破"
 cultivation_breakthrough.1000.desc:0 "你静坐冥想，聚集周围的灵性能量。这是决胜时刻——你能否突破到聚气境界？"
 cultivation_breakthrough.1000.attempt:0 "现在就尝试突破"
 cultivation_breakthrough.1000.wait:0 "等待更好的机会"
 cultivation_breakthrough.1000.s_tt:0 "#high Success:#！上升到[GetTrait('cultivation_qi_gathering').GetName(GetNullCharacter)]领域！"
 cultivation_breakthrough.1000.f_tt:0 "#低故障率:#! +15[stress|E]， 获得 [GetModifier('failed_breakthrough_attempt').GetNameWithTooltip]3个月"

 cultivation_breakthrough.1001.t:0 "突破性成功！"
 cultivation_breakthrough.1001.desc:0 "一股强大的精神能量涌入你的身体！当你踏入其中的那一刻，你的肉身破碎了。[GetTrait('cultivation_qi_gathering').GetName(GetNullCharacter)]境界。世界似乎更加明亮，你的感官更加敏锐——你已经迈出了通往永生的第一步！"
 cultivation_breakthrough.1001.a:0 "我突破了！"

 cultivation_breakthrough.1002.t:0 "突破失败"
 cultivation_breakthrough.1002.desc:0 "气从你指间溜走，如同水从指缝间流过。你的根基摇晃，但依然稳固。这次你失败了，但恢复之后你可以再次尝试。"
 cultivation_breakthrough.1002.a:0 "我需要做更多准备……"

 # Qi Refining (1100-1102)
 cultivation_breakthrough.1100.t:0 "气精炼突破"
 cultivation_breakthrough.1100.desc:0 "你体内聚集的真气翻涌涌动，准备被提炼成更加纯净的形态。下一个境界在等待着你——但难度也会随之增加。"
 cultivation_breakthrough.1100.attempt:0 "现在就尝试突破"
 cultivation_breakthrough.1100.wait:0 "等待更好的机会"
 cultivation_breakthrough.1100.s_tt:0 "#high Success:#！上升到[GetTrait('cultivation_qi_refining').GetName(GetNullCharacter)]领域！"
 cultivation_breakthrough.1100.f_tt:0 "#低故障率：#! +20[stress|E]， 获得 [GetModifier('failed_breakthrough_attempt').GetNameWithTooltip]3个月"

 cultivation_breakthrough.1101.t:0 "精炼成功！"
 cultivation_breakthrough.1101.desc:0 "你的气发生了转变，变得更加纯净、更加强大！你已经进入了……[GetTrait('cultivation_qi_refining').GetName(GetNullCharacter)]境界。如今，每一次呼吸都吸入精炼的精神能量。"
 cultivation_breakthrough.1101.a:0 "我的气已经精炼了！"

 cultivation_breakthrough.1102.t:0 "炼气失败"
 cultivation_breakthrough.1102.desc:0 "精炼过程出了差错。你的气没有改变，但你感觉到了哪里出了问题。下次一定不一样。"
 cultivation_breakthrough.1102.a:0 "我再试一次……"

 # Qi Building (1200-1202)
 cultivation_breakthrough.1200.t:0 "气建筑突破"
 cultivation_breakthrough.1200.desc:0 "你精炼的真气需要结构。你必须为结核打下稳固的基础——这是修炼过程中至关重要的一步。"
 cultivation_breakthrough.1200.attempt:0 "现在就尝试突破"
 cultivation_breakthrough.1200.wait:0 "等待更好的机会"
 cultivation_breakthrough.1200.s_tt:0 "#high Success:#！上升到[GetTrait('cultivation_qi_building').GetName(GetNullCharacter)]领域！"
 cultivation_breakthrough.1200.f_tt:0 "#低故障率:#! +25[stress|E]， 获得 [GetModifier('failed_breakthrough_attempt').GetNameWithTooltip]3个月"

 cultivation_breakthrough.1201.t:0 "气功助你成功！"
 cultivation_breakthrough.1201.desc:0 "你的气根稳固了！一砖一瓦，层层夯实，你为未来的金刚心打下了坚实的基础。[GetTrait('cultivation_qi_building').GetName(GetNullCharacter)]这片土地是你的！"
 cultivation_breakthrough.1201.a:0 "我的地基很牢固！"

 cultivation_breakthrough.1202.t:0 "齐氏大厦倒塌"
 cultivation_breakthrough.1202.desc:0 "你的气结构出现了裂缝，根基无法稳固。你必须更加努力学习，才能再次尝试。"
 cultivation_breakthrough.1202.a:0 "继续学习……"

 # Core Formation (1300-1302)
 cultivation_breakthrough.1300.t:0 "核心形成突破"
 cultivation_breakthrough.1300.desc:0 "现在正是将你的气凝聚成金核的时刻。这才是真正长生不老的开始！成功意味着超越死亡本身。"
 cultivation_breakthrough.1300.attempt:0 "现在就尝试突破"
 cultivation_breakthrough.1300.wait:0 "等待更好的机会"
 cultivation_breakthrough.1300.s_tt:0 "#high Success:#！上升到[GetTrait('cultivation_core_formation').GetName(GetNullCharacter)]领域！"
 cultivation_breakthrough.1300.f_tt:0 "#低故障率：#! +30[stress|E]， 获得 [GetModifier('failed_breakthrough_attempt').GetNameWithTooltip]3个月"

 cultivation_breakthrough.1301.t:0 "核心形成成功！"
 cultivation_breakthrough.1301.desc:0 "一道耀眼的金光从你的丹田迸发而出！你的真气凝聚成一个完美的金核，散发出强大的力量。你已不再是凡人——通往永生的道路已在你面前敞开！"
 cultivation_breakthrough.1301.a:0 "黄金核心形成！"

 cultivation_breakthrough.1302.t:0 "核心形成失败"
 cultivation_breakthrough.1302.desc:0 "气无法凝聚，你的核心依然未成形。这是一个难以逾越的障碍——许多修士都在此停留数十年之久。但你还会再试一次。"
 cultivation_breakthrough.1302.a:0 "瓶颈依然存在……"

 # Nascent Soul (1400-1402)
 cultivation_breakthrough.1400.t:0 "初生灵魂的突破"
 cultivation_breakthrough.1400.desc:0 "你那金子般的核心开始出现裂痕……这不是失败，而是转变！一个新生的灵魂将从中诞生！"
 cultivation_breakthrough.1400.attempt:0 "现在就尝试突破"
 cultivation_breakthrough.1400.wait:0 "等待更好的机会"
 cultivation_breakthrough.1400.s_tt:0 "#high Success:#！上升到[GetTrait('cultivation_nascent_soul').GetName(GetNullCharacter)]领域！"
 cultivation_breakthrough.1400.f_tt:0 "#低故障率:#! +35[stress|E]， 获得 [GetModifier('failed_breakthrough_attempt').GetNameWithTooltip]3个月"

 cultivation_breakthrough.1401.t:0 "初生灵魂的成功！"
 cultivation_breakthrough.1401.desc:0 "你的金刚核心破碎，从中诞生出一个微缩版的你——你的新生灵魂！即使你的肉体消亡，你的灵魂也能永存。真正的永生近在咫尺！"
 cultivation_breakthrough.1401.a:0 "我的灵魂诞生了！"

 cultivation_breakthrough.1402.t:0 "初生的灵魂失败了"
 cultivation_breakthrough.1402.desc:0 "转变失败了。你的本质完好无损，却一成不变。初生的灵魂拒绝显现。"
 cultivation_breakthrough.1402.a:0 "还没有..."

 # Heavenly Being (1500-1502)
 cultivation_breakthrough.1500.t:0 "天界突破"
 cultivation_breakthrough.1500.desc:0 "超越尘世，升华为天界！你那初生的灵魂渴望蜕变。"
 cultivation_breakthrough.1500.attempt:0 "现在就尝试突破"
 cultivation_breakthrough.1500.wait:0 "等待更好的机会"
 cultivation_breakthrough.1500.s_tt:0 "#high Success:#！上升到[GetTrait('cultivation_heavenly_beingg').GetName(GetNullCharacter)]领域！"
 cultivation_breakthrough.1500.f_tt:0 "#低故障率：#! +40[stress|E]， 获得 [GetModifier('failed_breakthrough_attempt').GetNameWithTooltip]3个月"

 cultivation_breakthrough.1501.t:0 "天赐成功！"
 cultivation_breakthrough.1501.desc:0 "你新生的灵魂升华了！你不再受凡人法则的束缚。连天界都认可你的存在！"
 cultivation_breakthrough.1501.a:0 "我升天了！"

 cultivation_breakthrough.1502.t:0 "天上的存在失败了"
 cultivation_breakthrough.1502.desc:0 "天谴与你为敌，屏障坚不可摧。"
 cultivation_breakthrough.1502.a:0 "天涯海角阻挡了我的去路……"

 # Four-Axis (1600-1602)
 cultivation_breakthrough.1600.t:0 "四轴突破"
 cultivation_breakthrough.1600.desc:0 "掌握四大基本力量，超越天际！"
 cultivation_breakthrough.1600.attempt:0 "现在就尝试突破"
 cultivation_breakthrough.1600.wait:0 "等待更好的机会"
 cultivation_breakthrough.1600.s_tt:0 "#high Success:#！上升到[GetTrait('cultivation_four_axis').GetName(GetNullCharacter)]领域！"
 cultivation_breakthrough.1600.f_tt:0 "#低故障率:#! +45[stress|E]， 获得 [GetModifier('failed_breakthrough_attempt').GetNameWithTooltip]3个月"

 cultivation_breakthrough.1601.t:0 "四轴成功！"
 cultivation_breakthrough.1601.desc:0 "四轴齐备！空间、时间、物质、能量——全都臣服于你的意志！"
 cultivation_breakthrough.1601.a:0 "这些力量是我的！"

 cultivation_breakthrough.1602.t:0 "四轴失效"
 cultivation_breakthrough.1602.desc:0 "这些力量仍然超出你的掌控。"
 cultivation_breakthrough.1602.a:0 "不够强……"

 # Integration (1700-1702)
 cultivation_breakthrough.1700.t:0 "整合突破"
 cultivation_breakthrough.1700.desc:0 "将你所有的修炼心得融会贯通，达到完美和谐！"
 cultivation_breakthrough.1700.attempt:0 "现在就尝试突破"
 cultivation_breakthrough.1700.wait:0 "等待更好的机会"
 cultivation_breakthrough.1700.s_tt:0 "#high Success:#！上升到[GetTrait('cultivation_integration').GetName(GetNullCharacter)]领域！"
 cultivation_breakthrough.1700.f_tt:0 "#低故障率：#! +50[stress|E]， 获得 [GetModifier('failed_breakthrough_attempt').GetNameWithTooltip]3个月"

 cultivation_breakthrough.1701.t:0 "集成成功！"
 cultivation_breakthrough.1701.desc:0 "完美融合！您种植的各个方面都融为一体！"
 cultivation_breakthrough.1701.a:0 "实现统一！"

 cultivation_breakthrough.1702.t:0 "集成失败"
 cultivation_breakthrough.1702.desc:0 "碎片无法拼合。你的修炼依然支离破碎。"
 cultivation_breakthrough.1702.a:0 "仍然支离破碎……"

 # Star Shattering (1800-1802)
 cultivation_breakthrough.1800.t:0 "星辰破碎的突破"
 cultivation_breakthrough.1800.desc:0 "只需一个手势，即可获得粉碎星辰的力量！"
 cultivation_breakthrough.1800.attempt:0 "现在就尝试突破"
 cultivation_breakthrough.1800.wait:0 "等待更好的机会"
 cultivation_breakthrough.1800.s_tt:0 "#high Success:#！上升到[GetTrait('cultivation_star_shattering').GetName(GetNullCharacter)]领域！"
 cultivation_breakthrough.1800.f_tt:0 "#低故障率:#! +55[stress|E]， 获得 [GetModifier('failed_breakthrough_attempt').GetNameWithTooltip]3个月"

 cultivation_breakthrough.1801.t:0 "惊天动地的成功！"
 cultivation_breakthrough.1801.desc:0 "你的力量向外爆发！群星在你面前颤抖！"
 cultivation_breakthrough.1801.a:0 "连星星都要向我俯首称臣！"

 cultivation_breakthrough.1802.t:0 "星辰破碎失败"
 cultivation_breakthrough.1802.desc:0 "星辰依然遥不可及。"
 cultivation_breakthrough.1802.a:0 "还没有..."

 # Sacred Vessel (1900-1902)
 cultivation_breakthrough.1900.t:0 "圣器突破"
 cultivation_breakthrough.1900.desc:0 "将你的身体转化为蕴含无限力量的神圣容器！"
 cultivation_breakthrough.1900.attempt:0 "现在就尝试突破"
 cultivation_breakthrough.1900.wait:0 "等待更好的机会"
 cultivation_breakthrough.1900.s_tt:0 "#high Success:#！上升到[GetTrait('cultivation_sacred_vessel').GetName(GetNullCharacter)]领域！"
 cultivation_breakthrough.1900.f_tt:0 "#低故障率：#! +60[stress|E]， 获得 [GetModifier('failed_breakthrough_attempt').GetNameWithTooltip]3个月"

 cultivation_breakthrough.1901.t:0 "圣器成功！"
 cultivation_breakthrough.1901.desc:0 "你的身体正在蜕变！你现在是一个蕴含无限潜能的神圣容器！"
 cultivation_breakthrough.1901.a:0 "我的身体太完美了！"

 cultivation_breakthrough.1902.t:0 "圣器失效"
 cultivation_breakthrough.1902.desc:0 "转变失败。你的肉身依然存在。"
 cultivation_breakthrough.1902.a:0 "终究是凡人……"

 # Entering Nirvana (2000-2002)
 cultivation_breakthrough.2000.t:0 "进入涅槃突破"
 cultivation_breakthrough.2000.desc:0 "通往真正超脱的最后一步。你愿意进入涅槃吗？"
 cultivation_breakthrough.2000.attempt:0 "现在就尝试突破"
 cultivation_breakthrough.2000.wait:0 "等待更好的机会"
 cultivation_breakthrough.2000.s_tt:0 "#high Success:#！上升到[GetTrait('cultivation_entering_nirvana').GetName(GetNullCharacter)]领域！"
 cultivation_breakthrough.2000.f_tt:0 "#低故障率:#! +65[stress|E]， 获得 [GetModifier('failed_breakthrough_attempt').GetNameWithTooltip]3个月"

 cultivation_breakthrough.2001.t:0 "迈向成功的巅峰！"
 cultivation_breakthrough.2001.desc:0 "你已步入涅槃！轮回已断！真正的超脱近在眼前！"
 cultivation_breakthrough.2001.a:0 "我进入涅槃！"

 cultivation_breakthrough.2002.t:0 "进入涅槃失败"
 cultivation_breakthrough.2002.desc:0 "涅槃之路依然关闭。还差最后一步。"
 cultivation_breakthrough.2002.a:0 "最后的障碍……"

 # True Immortal (2100-2102)
 cultivation_breakthrough.2100.t:0 "真正的不朽突破"
 cultivation_breakthrough.2100.desc:0 "终极蜕变即将到来。涅槃之后是真正的永生——永恒存在，不变不灭。这才是修炼的巅峰！"
 cultivation_breakthrough.2100.attempt:0 "现在就尝试突破"
 cultivation_breakthrough.2100.wait:0 "等待更好的机会"
 cultivation_breakthrough.2100.s_tt:0 "#high Success:#！上升到[GetTrait('cultivation_true_immortal').GetName(GetNullCharacter)]领域！"
 cultivation_breakthrough.2100.f_tt:0 "#低故障率：#! +70[stress|E]， 获得 [GetModifier('failed_breakthrough_attempt').GetNameWithTooltip]3个月"

 cultivation_breakthrough.2101.t:0 "真正的不朽成功！"
 cultivation_breakthrough.2101.desc:0 "你超越了凡人的一切限制！宇宙本身也承认你的存在，你是真正的不朽者。死亡毫无意义。时间也无法束缚你。你是永恒的！"
 cultivation_breakthrough.2101.a:0 "我是永生的！"

 cultivation_breakthrough.2102.t:0 "真不朽失败"
 cultivation_breakthrough.2102.desc:0 "最后的屏障依然存在。即使是涅槃也无法突破真正的永生。但你会坚持下去。"
 cultivation_breakthrough.2102.a:0 "一天..."

 contemplating_breakthrough:0 "思考突破"
 contemplating_breakthrough_desc:0 "陷入沉思，准备进行突破性尝试。"

 failed_breakthrough_attempt:0 "突破失败"
 failed_breakthrough_attempt_desc:0 "仍在从突破失败的阴影中恢复。基础尚不稳固。"

