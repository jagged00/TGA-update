 ##Martial Arts Men-at-Arms Descriptions
 martial_artist_cultivator_flavor:0 "刚刚踏上长生不老之路的修仙者"
 martial_artist_army_1_flavor:0 "新晋武术家。"
 martial_artist_army_2_flavor:0 "精通武艺的武术家。训练有素的战士。"
 martial_artist_army_3_flavor:0 "超越人类极限的武术家，能运用剑气。"
 zombie_army_1_flavor:0 "由尸体蜕皮而成的丧尸。无法思考或耕作。前线肉盾。"
