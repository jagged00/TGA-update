 cultivation_sect_visit.3102.desc:0 "那些将人心炼化为修炼资源的人。一位宗门长老前来评估你的潜力。"
 cultivation_sect_visit.3150.t:0 "夜影宫"
 cultivation_sect_visit.3150.desc:0 "暗道修炼者通过禁忌的缚魂术吸取灵力。一位宗门长老前来评估你的潜力。"
