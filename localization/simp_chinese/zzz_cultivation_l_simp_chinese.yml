 zombie_army_3_flavor:0 "广为人知且被广泛接受的复活之法。僵尸之法是某些宗门修炼方法的必备之物。能够理解并运用此法。忠于创造者。"
 zombie_army_4_flavor:0 "近乎完美复活。保留了一些前世记忆和修为。能够独立思考和行动。与创造者之间存在着一丝联系。"
 zombie_army_5_flavor:0 "死神是修炼死气并达到仙境的复活之人。"
 immortal_army_1_flavor:0 "玉武士已臻化境，体内流淌着皇室血脉。他们是孤傲而尊贵的真仙。"
 immortal_army_2_flavor:0 "他们凭借强大的力量达到了仙境。他们唯一的愿望就是战斗。"

