 ##################################################
 # BLOODLINES Desc
 ##################################################

 trait_yin_bloodline_desc:0 "天生寒性，与月亮相合的血统。阴性血统擅长精微的气血运行、魂术和长功法修炼。"
 trait_yin_bloodline_character_desc:0 "[ROOT.Char.GetFirstName]拥有阴血，经络平静，适合月光和精神修炼。"
 trait_yang_bloodline_desc:0 "炽热如日的血脉。阳血赋予其旺盛的生命力、爆发性的突破能力和霸道的进攻气。"
 trait_yang_bloodline_character_desc:0 "[ROOT.Char.GetFirstName]体内蕴含阳血，散发着热血活力和强烈的修炼意念。"
 trait_dragon_bloodline_desc:0 "一条与龙族意志紧密相连的古老王室血脉。龙血能够增强体魄、权威和战场威慑力。"
 trait_dragon_bloodline_character_desc:0 "[ROOT.Char.GetFirstName]身负龙血，散发着专横跋扈的气息，足以压制意志薄弱之人。"
 trait_phoenix_bloodline_desc:0 "凤凰血脉，象征着重生与净化，蕴含着高贵的火焰血统。凤凰之血赋予人坚韧不拔的精神，使其在苦难后得以恢复。"
 trait_phoenix_bloodline_character_desc:0 "[ROOT.Char.GetFirstName]拥有凤凰之血，以不屈的生命力经受住灾难。"
 trait_anchestor_bloodline_desc:0 "受先祖庇佑的血脉。这条血脉传承了技艺，稳定了世代相传的修炼。"
 trait_anchestor_bloodline_character_desc:0 "[ROOT.Char.GetFirstName]拥有祖先血脉，精神根基与氏族传承紧密相连。"
 trait_poison_bloodline_desc:0 "危险的血脉，蕴含着剧毒的精华。毒血会将气转化为腐蚀、毒素和阴险的杀戮手段。"
 trait_poison_bloodline_character_desc:0 "[ROOT.Char.GetFirstName]他们体内蕴藏着毒血，甚至他们的气也能从内部侵蚀敌人。"
 trait_cursed_bloodline_desc:0 "背负着沉重命运的血脉。诅咒之血赋予人禁忌的力量，但代价是可怕的业力后果。"
 trait_cursed_bloodline_character_desc:0 "[ROOT.Char.GetFirstName]身负诅咒之血，行走在一条充满力量却又笼罩着厄运的道路上。"
 trait_demon_bloodline_desc:0 "嗜杀成性的血脉，天生嗜血成性。恶魔之血造就了其残酷的成长和令人胆寒的压迫力。"
 trait_demon_bloodline_character_desc:0 "[ROOT.Char.GetFirstName]它体内流淌着魔血，散发着令人毛骨悚然的邪恶气息，即使是经验丰富的修士也会感到不安。"
 trait_primal_bloodline_desc:0 "源自天地之源的原始血脉，与道家基本法则有着天然的契合度。"
 trait_primal_bloodline_character_desc:0 "[ROOT.Char.GetFirstName]蕴含原始之血，与古老而未驯服的世界之气产生共鸣。"
 trait_spirit_bloodline_desc:0 "受神灵眷顾的清明血脉。神血能提升感知力、亲和力和对精妙气功的控制力。"
 trait_spirit_bloodline_character_desc:0 "[ROOT.Char.GetFirstName]身负灵血，天生能感知天地间的细微变化。"
 trait_sun_bloodline_desc:0 "源自纯粹太阳精华的耀眼血脉。太阳之血赋予火焰术、净化术和强悍的日间修炼力量。"
 trait_sun_bloodline_character_desc:0 "[ROOT.Char.GetFirstName]蕴含太阳之血，闪耀着强烈的阳刚之光。"

