 ## VISIT EVENTS

 visit_cultivation_sect_decision:0 "造访修仙宗"
 visit_cultivation_sect_decision_desc:0 "修真者往往隶属于不同的宗门。有些宗门历史悠久，与世界本身一样古老；而有些宗门则是新近创立的。拜访某个宗门，了解其历史和修炼之道——然后决定是加入他们，还是让他们在你的力量面前颤抖。"
 visit_cultivation_sect_decision_tooltip:0 "选择一个教派进行参拜。"
 visit_cultivation_sect_decision_confirm:0 "访问 Sect"

 cultivation_sect_visit.1000.t:0 "华山宗"
 cultivation_sect_visit.1000.desc:0 "这是一个以精湛剑术和正道修炼著称的著名正统宗门。一位宗门长老前来考察你的潜力。"
 cultivation_sect_visit.1001.t:0 "天剑阁"
 cultivation_sect_visit.1001.desc:0 "他们是精通天剑术的高手，信奉天剑合一的理念。一位宗门长老前来考察你的潜力。"
 cultivation_sect_visit.1002.t:0 "Azure Edge 部门"
 cultivation_sect_visit.1002.desc:0 "精通迅捷青刃的武者，将速度与精准融为一体。一位宗门长老前来考察你的潜力。"
 cultivation_sect_visit.1003.t:0 "万剑谷"
 cultivation_sect_visit.1003.desc:0 "这是一个剑术云集的山谷，弟子们在此学习上千种剑法。一位宗门长老前来考察你的潜力。"
 cultivation_sect_visit.1004.t:0 "紫雷刃宗"
 cultivation_sect_visit.1004.desc:0 "挥舞着雷霆之剑，将雷霆之怒注入剑刃。一位宗门长老前来评估你的潜力。"
