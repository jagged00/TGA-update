 XIANXIA_FORCE_SECT_SUBMISSION_WAR_NAME:0 "武教臣服"
 XIANXIA_FORCE_SECT_SUBMISSION_WAR_NAME_BASE:0 "投降之战"
 xianxia_force_sect_submission_victory_desc:0 "[defender.GetShortUIName|U]被迫臣服。"
 xianxia_force_sect_submission_victory_desc_attacker:0 "你征服了[defender.GetShortUIName]并使他们成为你的附庸。"
 xianxia_force_sect_submission_victory_desc_defender:0 "你被迫屈服于贡赋。[attacker.GetShortUIName]."
 xianxia_force_sect_submission_white_peace_desc:0 "不强制要求提交。"
 xianxia_force_sect_submission_white_peace_desc_defender:0 "你保持独立。"
 xianxia_force_sect_submission_defeat_desc:0 "[defender.GetShortUIName|U]拒绝屈服。"
 xianxia_force_sect_submission_defeat_desc_attacker:0 "你未能征服他们。"

