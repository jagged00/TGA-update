 XIANXIA_SEIZE_SPIRIT_VEIN_WAR_NAME:0 "静脉痉挛"
 XIANXIA_SEIZE_SPIRIT_VEIN_WAR_NAME_BASE:0 "灵脉战争"
 xianxia_seize_spirit_vein_victory_desc:0 "[defender.GetShortUIName|U]他的灵脉被截断，他的真气流入你的宗门。"
 xianxia_seize_spirit_vein_victory_desc_attacker:0 "你声称拥有灵脉[defender.GetShortUIName]，从而提升你宗门的修为。"
 xianxia_seize_spirit_vein_victory_desc_defender:0 "你的灵脉断绝，它的真气被夺走了[attacker.GetShortUIName]."
 xianxia_seize_spirit_vein_white_peace_desc:0 "战斗结束时，灵脉的控制权并未易手。"
 xianxia_seize_spirit_vein_white_peace_desc_defender:0 "你暂时还能控制你的灵脉。"
 xianxia_seize_spirit_vein_defeat_desc:0 "[defender.GetShortUIName|U]成功守护了他们的灵脉。"
 xianxia_seize_spirit_vein_defeat_desc_attacker:0 "你没能夺取灵脉，丢了面子。"

