 weapon_path_spear:0 "长矛之路"
 weapon_path_fist:0 "身体路径"
 trait_weapon_path_sword:0 "剑道"
 trait_weapon_path_saber:0 "剑道"
 trait_weapon_path_spear:0 "长矛之路"
 trait_weapon_path_fist:0 "身体路径"
 trait_sect_disciple_desc:0 "一名年轻修士正式加入宗门。"
 trait_sect_elder_desc:0 "一位指导弟子并守护宗门的高级修士。"
 trait_sect_leader_desc:0 "教派公认的领袖和教令持有者。"
 trait_jianghu_righteous_desc:0 "在江湖中以正直的品行和高尚的修养而闻名。"
 trait_jianghu_demonic_desc:0 "在江湖中以残忍、魔鬼般的手段而闻名。"
 trait_weapon_path_sword_desc:0 "这位修士修炼的是剑道。"
 trait_weapon_path_saber_desc:0 "这位修士奉行的是刀道。"
 trait_weapon_path_spear_desc:0 "这位修士遵循的是枪之道。"
 trait_weapon_path_fist_desc:0 "这位修炼者遵循身拳之道。"
 weapon_combat_talent_1:0 "武器天赋 I"
 weapon_combat_talent_2:0 "武器天赋 II"
 weapon_combat_talent_3:0 "武器天赋 III"
 weapon_combat_talent_4:0 "武器天赋 IV"
 weapon_combat_talent_5:0 "武器天赋 V"
 trait_weapon_combat_talent_1:0 "武器天赋 I"
 trait_weapon_combat_talent_2:0 "武器天赋 II"
 trait_weapon_combat_talent_3:0 "武器天赋 III"
 trait_weapon_combat_talent_4:0 "武器天赋 IV"
 trait_weapon_combat_talent_5:0 "武器天赋 V"
 trait_weapon_combat_talent_1_desc:0 "基本战斗能力。[GetTrait('weapon_combat_talent_1').GetName( GetNullCharacter )]拨款 +5[prowess|E]."
 trait_weapon_combat_talent_2_desc:0 "培养了战斗能力。[GetTrait('weapon_combat_talent_2').GetName( GetNullCharacter )]拨款 +10[prowess|E]."
 trait_weapon_combat_talent_3_desc:0 "高级战斗技能。[GetTrait('weapon_combat_talent_3').GetName( GetNullCharacter )]拨款 +15[prowess|E]."
 trait_weapon_combat_talent_4_desc:0 "卓越的战斗天赋。[GetTrait('weapon_combat_talent_4').GetName( GetNullCharacter )]拨款 +20[prowess|E]."
 trait_weapon_combat_talent_5_desc:0 "超凡脱俗的战斗天赋。[GetTrait('weapon_combat_talent_5').GetName( GetNullCharacter )]拨款 +25[prowess|E]."

 found_sect_domain_decision:0 "发现了一个教派域名"
 found_sect_domain_decision_desc:0 "将你的山岳和郡县宣布为真正的宗派领地。长老和弟子将在你的管辖下正式建立。"
 found_sect_domain_decision_tooltip:0 "建立稳定的教派等级制度，并使你的领地成为一个在地图上可见的教派政体。"
 found_sect_domain_decision_confirm:0 "竖起山岳旗帜。"

 refine_spirit_pill_decision:0 "炼制灵丹"
 refine_spirit_pill_decision_desc:0 "消耗稀有草药和灵石，尝试进行高级炼金术。成功获得力量，失败则招致反噬。"
 refine_spirit_pill_decision_tooltip:0 "炼丹术风险与回报并存，可能导致修炼偏离正轨甚至死亡。"
 refine_spirit_pill_decision_confirm:0 "点燃坩埚。"

 comprehend_martial_manual_decision:0 "理解武术手册"
 comprehend_martial_manual_decision_desc:0 "研习剑法经典、刀法图解、身法石板和枪法意念，以加深你的武道修行。"
 comprehend_martial_manual_decision_tooltip:0 "获得武器修炼路线和以功夫修炼为重点的武术提升。"
 comprehend_martial_manual_decision_confirm:0 "翻开玉页。"

 enter_secret_realm_decision:0 "进入一个秘密领域"
 enter_secret_realm_decision_desc:0 "深入隐藏的洞穴、破碎的世界和传承的洞穴，在那里，财富与危险并存。"
 enter_secret_realm_decision_tooltip:0 "冒险远征，获取遗产（黄金或耕作进度）。"
 enter_secret_realm_decision_confirm:0 "穿过那扇隐秘的门。"

 undergo_heavenly_tribulation_decision:0 "经历天劫"
 undergo_heavenly_tribulation_decision_desc:0 "当你的境界成熟时，上天会考验你的道。承受雷霆和因果报应才能升华——否则就会灭亡。"
 undergo_heavenly_tribulation_decision_tooltip:0 "高风险突破压力测试，结果可能成功、偏离或死亡。"
 undergo_heavenly_tribulation_decision_confirm:0 "面对上天的审判。"

 xianxia_world.1100.t:0 "江湖誓约集会"
 xianxia_world.1100.desc:0 "使者将你的邀请函传遍江湖。剑客、宗门使者、炼丹师和游侠齐聚一堂，参加一场真正的武林比武大会。"
 xianxia_world.1100.a:0 "比赛开始。"

 xianxia_world.1200.t:0 "教派领地宣告"
 xianxia_world.1200.desc:0 "你的山岳、殿堂及附属郡县已重组为一个真正的宗门领地。长老管理，弟子训练，你的旗帜飘扬于世。"
 xianxia_world.1200.a:0 "该宗派存在于人间。"

 xianxia_world.1300.t:0 "灵丹炼制"
 xianxia_world.1300.desc:0 "坩埚内火焰熊熊燃烧。这批炼制出来的药剂，究竟会成为逆天灵药，还是会毒害你的经络？"
 xianxia_world.1300.a:0 "密封炉膛。"

 xianxia_world.1400.t:0 "手动理解"
 xianxia_world.1400.desc:0 "你冥想于已故大师们留下的传承图表和注释之上。"
 xianxia_world.1400.a:0 "我的武器路线更加清晰了。"

 xianxia_world.1500.t:0 "秘境探险"
 xianxia_world.1500.desc:0 "在隐秘的领域深处，灵兽游荡，恶魔的回声低语。废墟之中，或许还残留着一份遗产。"
 xianxia_world.1500.a:0 "接受命运的安排。"

 xianxia_world.1600.t:0 "天上的患难"
 xianxia_world.1600.desc:0 "雷云盘旋在你头顶，闪电在天空中写下审判的字样。"
 xianxia_world.1600.a:0 "我向天堂发起挑战。"

 sect_headquarters_realm:0 "教派总部"
 sect_headquarters_realm_desc:0 "这个领域以宗派统治和武力管理为组织形式。"
 sect_resource_surplus:0 "教派资源激增"
 sect_resource_surplus_desc:0 "聚会圆满成功后，人们纷纷献上贡品和精神慰藉。"
 alchemy_backlash:0 "炼金术反噬"
 alchemy_backlash_desc:0 "炼制失败已损伤经络和生命力。"
 perfected_spirit_pill:0 "完美灵丹"
 perfected_spirit_pill_desc:0 "上等灵丹能够淬炼身心。"
 manual_comprehension:0 "手动理解"
 manual_comprehension_desc:0 "近期研读经文加快了修行见识。"
 tribulation_survivor:0 "苦难幸存者"
 tribulation_survivor_desc:0 "这位修士曾遭受天雷袭击，幸存下来，并磨砺了自己的道心。"
 cultivation_deviation:0 "栽培偏差"
 cultivation_deviation_desc:0 "气血运行失衡，导致严重的内部反噬。"
 secret_realm_inheritance:0 "秘境传承"
 secret_realm_inheritance_desc:0 "一份古老的传承赋予了它丰富的资源和深厚的修炼指导。"
 high_realm_longevity:0 "高境界长寿"
 high_realm_longevity_desc:0 "深厚的修炼可以延年益寿，并大大减少世俗的疾病。"
 jianghu_reputation_righteous:0 "江湖义名"
 jianghu_reputation_righteous_desc:0 "这个角色被认为是正统江湖秩序的守护者。"
 jianghu_reputation_demonic:0 "魔族江湖名声"
 jianghu_reputation_demonic_desc:0 "这个角色的名字令人恐惧，因为他走上了一条邪恶的道路。"
 sect_governance_feudal_adapted:0 "教派适应的封建治理"
 sect_governance_feudal_adapted_desc:0 "封建制度经过改造，以适应宗派等级制度和军事义务。"
 sect_governance_republic_adapted:0 "教派适应的商业治理"
 sect_governance_republic_adapted_desc:0 "商人的治理现在融合了宗门贡品和修仙者的权力。"
 sect_governance_clan_adapted:0 "教派适应型氏族治理"
 sect_governance_clan_adapted_desc:0 "宗族结构转向宗门忠诚、资历和修为。"
 sect_governance_tribal_adapted:0 "教派适应的武力部落治理"
 sect_governance_tribal_adapted_desc:0 "部落战帮重组为宗派战系和外殿军团。"
 sect_governance_theocracy_adapted:0 "教派适应性精神治理"
 sect_governance_theocracy_adapted_desc:0 "寺庙和经文机构融入了修行正统和宗派律法之中。"
 sect_governance_administrative_adapted:0 "教派适应性行政治理"
 sect_governance_administrative_adapted_desc:0 "官僚治理围绕教派登记、资源配额和长老审查进行重塑。"
 jianghu_realm_friction:0 "凡人治理摩擦"
 jianghu_realm_friction_desc:0 "一位非修仙者统治者，努力掌控一个受江湖和宗门期望影响的国度。"
 sect_inner_hall_elder:0 "内殿长老"
 sect_outer_hall_elder:0 "外殿长老"
 sect_enforcement_elder:0 "执法长老"
 sect_lineage_heir:0 "血统继承人"
 trait_sect_inner_hall_elder:0 "内殿长老"
 trait_sect_outer_hall_elder:0 "外殿长老"
 trait_sect_enforcement_elder:0 "执法长老"
 trait_sect_lineage_heir:0 "血统继承人"
 trait_sect_inner_hall_elder_desc:0 "一位资深的内殿教官，负责核心技巧和经文监督。"
 trait_sect_outer_hall_elder_desc:0 "负责训练更广泛的弟子并保障宗门后勤的外殿管理者。"
 trait_sect_enforcement_elder_desc:0 "一位负责执行宗门律法并惩罚背叛行为的戒律长老。"
 trait_sect_lineage_heir_desc:0 "被指定为大师秘籍和世袭声望的继承人。"

 xianxia_world.1110.t:0 "锦标赛第二轮"
 xianxia_world.1110.desc:0 "第一轮比赛化解旧怨，第二轮比赛则血流成河，名声大噪。伤病蔓延，新的对手涌现，而你的旗帜将在竞技场上空飘扬。"
 xianxia_world.1110.a:0 "晋级决胜轮。"
 xianxia_world.1120.t:0 "锦标赛决赛"
 xianxia_world.1120.desc:0 "在最后的交锋中，你的一方宣称胜利，并确保了教派的声望、资源和新的誓言。"
 xianxia_world.1120.a:0 "夺取江湖桂冠。"

 xianxia_world.1510.t:0 "秘密领域 - 中途试炼"
 xianxia_world.1510.desc:0 "你们的探险队不断深入阵法和灵兽之中。虽然稳步前进，但每一步都可能功亏一篑。"
 xianxia_world.1510.a:0 "继续深入。"
 xianxia_world.1520.t:0 "秘境 - 最终传承"
 xianxia_world.1520.desc:0 "在王国的中心，传承祭坛闪烁着光芒。财富、经文或歧途，都将根据你的选择而呈现。"
 xianxia_world.1520.a:0 "领取最终奖励。"

 xianxia_world.1310.t:0 "炼金炉准备"
 xianxia_world.1310.desc:0 "草药、矿石、灵核和熔炉阵列均按等级顺序排列。熔炉品质和你的操作将决定这批物品的等级。"
 xianxia_world.1310.a:0 "开始分层精炼。"
 xianxia_world.1320.t:0 "炼金术结果"
 xianxia_world.1320.desc:0 "炉门开启。要么炼制出上等药材，要么走偏伤身躯和经络。"
 xianxia_world.1320.a:0 "接受结果。"

 xianxia_world.1900.t:0 "仙侠调试面板"
 xianxia_world.1900.desc:0 "使用此快速状态面板，可以在一个地方查看修炼阶段、宗门办公室、激活的修饰符以及当前的冷却/标记状态。"
 xianxia_world.1900.a:0 "评估当前状态。"
 xianxia_debug_state_decision:0 "仙侠调试状态"
 xianxia_debug_state_decision_desc:0 "显示一份简洁的调试报告，内容包括你的修炼进度、宗门角色、修正值和冷却标志。"
 xianxia_debug_state_decision_tooltip:0 "打开调试事件，汇总阶段、办公室、当前增益/减益效果以及关键冷却时间/标志。"
 xianxia_debug_state_decision_confirm:0 "打开调试面板。"
 xianxia_debug_stage_tt:0 "修炼阶段：查看你当前的境界特性（从聚气到真仙）。"
 xianxia_debug_sect_role_tt:0 "宗门角色：查看弟子/长老/内殿/外殿/执法者/领袖特质。"
 xianxia_debug_modifiers_tt:0 "当前属性修正：查看角色的当前修炼、炼丹、宗门和远征属性修正。"
 xianxia_debug_cooldowns_tt:0 "冷却时间/标记：检查突破、磨难、远征和炼金术的冷却时间标记。"

 sect_resource_obligations:0 "教派资源义务"
 sect_resource_obligations_desc:0 "宗门必须满足丹药、矿石、秘籍和贡品的配额要求。"
 sect_resource_stockpile:0 "教派资源储备"
 sect_resource_stockpile_desc:0 "国库和仓库已满，教派运作和信徒人数均有所增加。"
 sect_internal_dispute:0 "教派内部纷争"
 sect_internal_dispute_desc:0 "派系之间在法律、继承和纪律问题上的分歧正在削弱凝聚力。"
 sect_power_struggle:0 "教派权力斗争"
 sect_power_struggle_desc:0 "内部派系和执法派系正在积极争夺权力。"
 tournament_chain_momentum:0 "锦标赛势头"
 tournament_chain_momentum_desc:0 "连续获胜可以培养武术节奏和自信心。"
 tournament_chain_injury:0 "锦标赛伤病"
 tournament_chain_injury_desc:0 "比赛中受伤会延缓恢复速度并影响比赛状态。"
 expedition_progress:0 "探险进展"
 expedition_progress_desc:0 "通过分阶段试验稳步取得进展，可以提高洞察力和准备度。"
 expedition_setback:0 "探险受挫"
 expedition_setback_desc:0 "严酷的审判阶段造成了人员伤亡、延误和势头减弱。"
 lineage_prestige_mentor:0 "血统声望（导师）"
 lineage_prestige_mentor_desc:0 "这位导师的传承因成功培养弟子而闻名。"
 lineage_marked_disciple:0 "血统印记门徒"
 lineage_marked_disciple_desc:0 "这位弟子在正规传承的指导下成长，速度很快。"
 outer_court_disciple:0 "外院弟子"
 outer_court_disciple_desc:0 "一名普通新兵被教派外院接纳，接受基础训练和服务。"
 inner_court_disciple:0 "内院弟子"
 inner_court_disciple_desc:0 "晋升的弟子，享有查阅宗派手册、资源和核心教义的特权。"
 promoted_sect_elder:0 "最近晋升的长老"
 promoted_sect_elder_desc:0 "这位修士最近晋升为长老，目前既享有很高的声望，又肩负着重要的宗门责任。"
 alchemy_furnace_masterwork:0 "大师级熔炉操作"
 alchemy_furnace_masterwork_desc:0 "对炉体质量的良好控制能够提高加工精度。"
 alchemy_qi_deviation_wound:0 "炼金术偏差伤口"
 alchemy_qi_deviation_wound_desc:0 "炉火反冲损伤经络，留下持久的气机不稳定。"
 xianxia_world.1110.b:0 "采取积极的策略，争取与对手一较高下。"
 xianxia_world.1510.b:0 "强行走一条危险的捷径通过审判。"

 xianxia_world.1720.t:0 "教派理事会"
 xianxia_world.1720.desc:0 "内殿、外殿和执法长老聚集在一起，争论教义、资源和惩罚政策。"
 xianxia_world.1720.a:0 "达成共识并明确义务。"
 xianxia_world.1720.b:0 "允许各集团为争夺影响力而发生冲突。"

 xianxia_world.1730.t:0 "议会分裂的后果"
 xianxia_world.1730.desc:0 "失败的理事会会议破坏了信任。下一步行动将决定该教派是走向中央集权还是寻求和解。"
 xianxia_world.1730.a:0 "通过强制手段镇压异议。"
 xianxia_world.1730.b:0 "通过道堂斡旋达成妥协。"

 xianxia_world.1330.t:0 "收集炼金术输入"
 xianxia_world.1330.desc:0 "在精炼之前，侦察兵和管家可以收集草药、矿石和灵核来提高产量。"
 xianxia_world.1330.a:0 "确保草药和矿石运输安全。"
 xianxia_world.1330.b:0 "猎杀危险的灵核。"

 convene_sect_council_decision:0 "召开教派理事会"
 convene_sect_council_decision_desc:0 "召集内殿、外殿和执行长老，商讨教义、义务和继承压力。"
 convene_sect_council_decision_tooltip:0 "进行一次能够产生共识奖励或引发权力斗争链的理事会投票。"
 convene_sect_council_decision_confirm:0 "召集长老。"

 gather_alchemy_resources_decision:0 "收集炼金术输入"
 gather_alchemy_resources_decision_desc:0 "在进行大炼制之前，动员弟子和管家收集草药、矿石和灵核。"
 gather_alchemy_resources_decision_tooltip:0 "准备资源储备，以提高炼金术成果的规模化。"
 gather_alchemy_resources_decision_confirm:0 "准备好补给车队。"

 xianxia_debug_stage_qi_gathering_tt:0 "调试：阶段 = Qi 聚集"
 xianxia_debug_stage_qi_refining_tt:0 "调试：阶段 = 气精炼"
 xianxia_debug_stage_core_formation_tt:0 "调试：阶段 = 核心形成"
 xianxia_debug_stage_nascent_soul_tt:0 "调试：阶段 = 新生灵魂"
 xianxia_debug_role_disciple_tt:0 "调试：教派角色 = 门徒"
 xianxia_debug_role_inner_hall_tt:0 "调试信息：宗门角色 = 内殿长老"
 xianxia_debug_role_outer_hall_tt:0 "调试信息：宗门角色 = 外殿长老"
 xianxia_debug_role_enforcement_tt:0 "调试信息：教派角色 = 执法长老"
 xianxia_debug_role_leader_tt:0 "调试信息：教派角色 = 教派领袖"
 xianxia_debug_has_tribulation_cd_tt:0 "调试信息：天劫冷却时间已激活。"
 xianxia_debug_has_alchemy_cd_tt:0 "调试信息：灵丹精炼冷却时间已激活。"
