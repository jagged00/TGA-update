 xianxia_artifact_soul_binding_gourd_desc:0 "刻有封印文字的魔道葫芦，可以压制残留的怨恨灵魂和敌对意图。"
 xianxia_artifact_nine_dragon_cauldron_name:0 "九龙鼎"
 xianxia_artifact_nine_dragon_cauldron_desc:0 "一口古老的炼丹炉，炉口有九个龙嘴，能以非凡的稳定性循环药气。"
 xianxia_artifact_voidstep_boots_name:0 "虚空步靴"
 xianxia_artifact_voidstep_boots_desc:0 "轻便的灵靴，编织有空间步符文，可实现行进和战场位置的突然变化。"
 xianxia_artifact_starfall_talisman_name:0 "星陨护符"
 xianxia_artifact_starfall_talisman_desc:0 "一种多层护身符条，可召唤微粒状星体力量来增强阵型和战斗气势。"
 xianxia_artifact_mirror_of_true_heart_name:0 "真心之镜"
 xianxia_artifact_mirror_of_true_heart_desc:0 "一面光洁如镜的宝镜，能映照出佩戴者内心的恶魔，并抚慰其道心。"
 xianxia_artifact_thunder_seal_bracelet_name:0 "雷霆密封手镯"
 xianxia_artifact_thunder_seal_bracelet_desc:0 "一个环状腕封，内含噼啪作响的闪电气，可增强近战中的爆发力。"
 xianxia_artifact_emerald_lotus_robe_name:0 "翡翠莲花长袍"
 xianxia_artifact_emerald_lotus_robe_desc:0 "一件注入莲花木精华的灵丝长袍，因其具有恢复和净化功效而备受推崇。"
 xianxia_artifact_mount_kunlun_inkstone_name:0 "昆仑山砚台"
 xianxia_artifact_mount_kunlun_inkstone_desc:0 "碑刻大师使用的砚台，可稳定经文抄写并保证符咒图案的准确性。"
 xianxia_artifact_ancestral_spirit_banner_name:0 "祖先之灵旗帜"
 xianxia_artifact_ancestral_spirit_banner_desc:0 "一面战旗飘扬，隐隐传来祖先的回响，鼓舞着忠诚修士的士气。"
 seek_legendary_world_artifact_decision:0 "寻找传说中的世界神器"
 seek_legendary_world_artifact_decision_desc:0 "传闻中，在禁忌的遗迹中隐藏着足以撼动世界的神器，那里阵法林立，古老守护者严阵以待，天罚几乎会杀死所有寻觅者。若非修为超凡，天赋异禀，此行无异于自杀。"
 seek_legendary_world_artifact_decision_tooltip:0 "尝试进行一次极其危险的探险，寻找传说中的神器。如果未能通过极限属性检定，几乎必死无疑。"
 seek_legendary_world_artifact_decision_confirm:0 "进入禁忌遗迹。"

 xianxia_world.1810.t:0 "禁忌圣物库"
 xianxia_world.1810.desc:0 "在一个崩塌的秘密世界中心，一座圣物宝库在血红色的闪电下开启。失败修士的尸山环绕着大门。一步走错，便意味着灭亡。\n\n只有技艺超群之人才能在核心阵列中幸存。其余人几乎都难逃死刑。"
 xianxia_world.1810.a:0 "以绝对的自信打破对方阵型。"
 xianxia_world.1810.b:0 "即使技术尚未达到巅峰，也要强行进入。"
 xianxia_world.1810.c:0 "撤退吧。这不是我命中注定的灾难。"

 legendary_artifact_finder:0 "传奇神器搜寻者"
 legendary_artifact_finder_desc:0 "这位修仙者从禁忌的宝库中幸存下来，并获得了历史上鲜有人见过的珍宝。"
 legendary_artifact_escape_wounds:0 "逃离了遗物库"
 legendary_artifact_escape_wounds_desc:0 "这位修士侥幸从禁忌的圣物库中活着逃了出来，身上带着重伤，精神状态也一直不稳定。"
 xianxia_artifact_sun_moon_pendant_name:0 "日月阴阳吊坠"
 xianxia_artifact_sun_moon_pendant_desc:0 "一款双面吊坠，平衡太阳和月亮的能量，平息突破周期中的修炼反作用。"
 xianxia_artifact_heavenly_river_map_name:0 "天河星图"
 xianxia_artifact_heavenly_river_map_desc:0 "刻在灵玉上的天象图，揭示了吉祥的行进路线和命运的交汇点。"
 xianxia_artifact_dragonbone_flute_name:0 "龙骨灵笛"
 xianxia_artifact_dragonbone_flute_desc:0 "一支用真正的龙骨雕刻而成的笛子，其共鸣能增强忠诚之心和战斗节奏。"
 xianxia_artifact_myriad_soul_lantern_name:0 "万魂灯笼"
 xianxia_artifact_myriad_soul_lantern_desc:0 "一盏能困住敌意和怨恨的鬼火灯笼，可以保护佩戴者免受阴谋诡计的侵害。"
 xianxia_artifact_phoenix_feather_cloak_name:0 "凤凰羽毛斗篷"
 xianxia_artifact_phoenix_feather_cloak_desc:0 "一件由凤凰羽毛织成的火属性斗篷，能够恢复活力并抵御腐败。"
 xianxia_artifact_mountain_sea_compass_name:0 "山海罗盘"
 xianxia_artifact_mountain_sea_compass_desc:0 "一款与地脉相契合的风水罗盘，能够改善战役计划和战略定位。"
 xianxia_artifact_blood_jade_seal_name:0 "血玉祖印"
 xianxia_artifact_blood_jade_seal_desc:0 "一枚祖传玉印，可巩固对藩属的统治，并提升威望。"
 xianxia_artifact_void_silk_sash_name:0 "空心丝绸腰带"
 xianxia_artifact_void_silk_sash_desc:0 "一条空间折叠的丝绸腰带，可以模糊佩戴者的路径，挫败敌对阴谋。"
 xianxia_artifact_heavenly_forge_hammer_name:0 "天铸锤"
 xianxia_artifact_heavenly_forge_hammer_desc:0 "一件能提升锻造稳定性并增强武术攻击力的遗物锻造锤。"
 xianxia_artifact_jade_cicada_charm_name:0 "玉蝉生命护身符"
 xianxia_artifact_jade_cicada_charm_desc:0 "具有保命功效的护身符，蕴含蝉的重生象征意义，能够提高生存率和恢复能力。"
 xianxia_artifact_thousand_needle_manual_name:0 "千针经文单"
 xianxia_artifact_thousand_needle_manual_desc:0 "一块金属经文牌，详细记载了微经络控制和精准气血循环。"
 xianxia_artifact_black_tortoise_shield_name:0 "黑龟灵盾"
 xianxia_artifact_black_tortoise_shield_desc:0 "一面防御性遗物盾牌，以黑龟星座为图案，可以削弱敌人的进攻。"
 xianxia_artifact_white_tiger_halberd_name:0 "白虎猎戟"
 xianxia_artifact_white_tiger_halberd_desc:0 "一把杀气腾腾的戟，能增强正面交锋中的进攻势头。"
 xianxia_artifact_azure_dragon_spear_name:0 "苍龙升天枪"
 xianxia_artifact_azure_dragon_spear_desc:0 "一杆刻有龙纹的长矛，可增强冲锋纪律和决斗技巧。"
 xianxia_artifact_vermilion_bird_fan_name:0 "朱红鸟火焰扇"
 xianxia_artifact_vermilion_bird_fan_desc:0 "一把能引导可控灵火的羽毛扇，可提升宫廷威望和仪式威望。"
 xianxia_artifact_ten_thousand_scroll_case_name:0 "万卷轴盒"
 xianxia_artifact_ten_thousand_scroll_case_desc:0 "便携式经文库，用于保存手册，加速学术和道教的理解。"
 xianxia_artifact_soul_calm_bell_name:0 "抚慰心灵的青铜铃铛"
 xianxia_artifact_soul_calm_bell_desc:0 "一种能抑制心魔、稳定情绪波动的共鸣钟。"
 xianxia_artifact_storm_chasing_boots_name:0 "追风靴"
 xianxia_artifact_storm_chasing_boots_desc:0 "专为在危险探险和战区快速机动而设计的疾风雷霆靴。"
 xianxia_artifact_immortal_peach_branch_name:0 "不朽桃枝"
 xianxia_artifact_immortal_peach_branch_desc:0 "一根带有长寿之气和温和疗愈功效的吉祥桃木枝。"
 xianxia_artifact_deep_abyss_orb_name:0 "深渊暗水球"
 xianxia_artifact_deep_abyss_orb_desc:0 "一个沉重的深渊球体，能够吸收精神冲击，并增强冷酷无情的教义使用者的力量。"
 xianxia_artifact_heavenly_silk_gloves_name:0 "天丝铭文手套"
 xianxia_artifact_heavenly_silk_gloves_desc:0 "精细的手套，可实现精准的护身符描绘和卓越的铭刻一致性。"
 xianxia_artifact_soulbreaker_chisel_name:0 "灵魂破坏者符文凿"
 xianxia_artifact_soulbreaker_chisel_desc:0 "一把禁忌的凿子，用来刻上削弱敌人抵抗力的压制符文。"
 xianxia_artifact_golden_crow_crown_name:0 "金鸦黎明皇冠"
 xianxia_artifact_golden_crow_crown_desc:0 "一顶散发着太阳光芒的王冠，能够鼓舞人心，彰显帝王风范。"
 xianxia_artifact_moon_rabbit_cauldron_name:0 "月兔灵药坩埚"
 xianxia_artifact_moon_rabbit_cauldron_desc:0 "一口与月亮相关的坩埚，以其温和而高效的药用提炼而闻名。"
 xianxia_artifact_earthvein_prayer_beads_name:0 "地脉念珠"
 xianxia_artifact_earthvein_prayer_beads_desc:0 "沉重的、压缩着地脉之气的珠子，将佩戴者牢牢地固定在压力之下。"
 xianxia_artifact_thunder_resonance_zither_name:0 "雷鸣共鸣齐特琴"
 xianxia_artifact_thunder_resonance_zither_desc:0 "七弦琴，奏响雷鸣，鼓舞军队战前士气。"
 xianxia_artifact_celestial_ink_brush_name:0 "天界墨笔"
 xianxia_artifact_celestial_ink_brush_desc:0 "永不干涸的画笔，是记录护身符和编纂教义的理想之选。"
 xianxia_artifact_nine_heavens_kite_name:0 "九重天灵风筝"
 xianxia_artifact_nine_heavens_kite_desc:0 "一种用于解读高空风向预兆、避开灾难性战役路线的仪式风筝。"
 xianxia_artifact_ancestral_bone_tablet_name:0 "祖先骨片"
 xianxia_artifact_ancestral_bone_tablet_desc:0 "一块用于祭祀祖先、增强血统凝聚力和提升声望的法器。"
 xianxia_artifact_chaos_refining_crucible_name:0 "混沌精炼坩埚"
 xianxia_artifact_chaos_refining_crucible_desc:0 "一个能够将混沌精华转化为可用修炼材料的易燃坩埚。"
 refine_grand_spirit_pills_decision:0 "精炼大灵丹"
 refine_grand_spirit_pills_decision_desc:0 "尝试仙侠传说中使用的高级丹药配方：炼体丹、清心丹、救劫丹、燃血丹。"
 refine_grand_spirit_pills_decision_tooltip:0 "多种高品质药丸配方可供选择，每种配方风险/收益各不相同。"
 refine_grand_spirit_pills_decision_confirm:0 "打开大熔炉。"

 host_jianghu_artifact_auction_decision:0 "主办江湖文物拍卖"
 host_jianghu_artifact_auction_decision_desc:0 "邀请宗门使者、流亡修士和隐世长老参加地下神器拍卖会，凡人、玄者和天界级神器将在此展开争夺。"
 host_jianghu_artifact_auction_decision_tooltip:0 "按等级竞拍文物，或者出售您自己的珍藏。"
 host_jianghu_artifact_auction_decision_confirm:0 "打开拍卖馆。"

 xianxia_world.1820.t:0 "江湖文物拍卖"
 xianxia_world.1820.desc:0 "灯笼渐渐熄灭，经纪人一件件地揭开拍品：凡人大小的饰品、意义深远的圣物，甚至还有传闻中的天界宝物。每一次出价都可能带来破产、仇恨，或是一夜暴富。"
 xianxia_world.1820.a:0 "竞拍凡人级物品"
 xianxia_world.1820.b:0 "竞拍深层地块"
 xianxia_world.1820.c:0 "挑战天阶竞价大战"
 xianxia_world.1820.d:0 "把我自己的珍藏拿出来出售"
 xianxia_world.1820.e:0 "观察后悄悄离开。"

 xianxia_world.1830.t:0 "大药丸配方精选"
 xianxia_world.1830.desc:0 "古老的秘方纸条摆在你面前。每一种秘方在修仙小说中都以威力惊人而闻名——但一旦失控，也会招致灾难性的后果。"
 xianxia_world.1830.a:0 "精炼健体丸"
 xianxia_world.1830.b:0 "精炼灵魂澄澈丸"
 xianxia_world.1830.c:0 "精炼劫卫丹"
 xianxia_world.1830.d:0 "精炼血火丸"
 xianxia_world.1830.e:0 "中止该批处理"

 alchemy_body_tempering_pill:0 "体质调理丸"
 alchemy_body_tempering_pill_desc:0 "一种能通过可控的痛苦来硬化肌肉和经络的浓稠炼体丹药。"
 alchemy_soul_clarity_pill:0 "灵魂澄澈丸"
 alchemy_soul_clarity_pill_desc:0 "一种清凉药丸，可以清除心中的恶魔，并增强对经文意图的理解。"
 alchemy_tribulation_guard_pill:0 "患难卫士丸"
 alchemy_tribulation_guard_pill_desc:0 "一种罕见的防御药丸，能够保护身体免受苦难的反噬和敌对的干扰。"
 alchemy_blood_ignition_pill:0 "血火丸"
 alchemy_blood_ignition_pill_desc:0 "一种能大幅提升战斗输出，但同时也会增加内部压力的强力增强剂。"

 auction_mortal_tier_find:0 "拍卖收益：凡人层级"
 auction_mortal_tier_find_desc:0 "以合理的价格买到了一块不错的低档地块。"
 auction_profound_tier_find:0 "拍卖收益：深层"
 auction_profound_tier_find_desc:0 "一批品质优良的玄级种子提升了这位种植者的地位和资源。"
 auction_heaven_tier_find:0 "拍卖收益：天阶"
 auction_heaven_tier_find_desc:0 "获得天级宝物将提升这位修士在各大宗门中的声望。"
 auction_rival_resentment:0 "拍卖竞争对手的怨恨"
 auction_rival_resentment_desc:0 "激进的竞标行为激怒了竞争对手，他们现在对此怀有持久的怨恨。"
 auction_renowned_seller:0 "知名拍卖卖家"
 auction_renowned_seller_desc:0 "成功售出个人珍宝，提升了这位修士作为高价值经纪人的声誉。"
 legendary_breakthrough_pill_ready:0 "传奇突破药丸"
 legendary_breakthrough_pill_ready_desc:0 "在珍稀遗物中发现了一颗逆天突破丹药。下一次突破尝试必定成功。"
 legendary_breakthrough_pill_found_tt:0 "你发现了一个[GetModifier('legendary_breakthrough_pill_ready').GetNameWithTooltip]隐藏在传奇神器之中。"
 study_magic_treasure_crafting_decision:0 "学习魔法宝物制作"
 study_magic_treasure_crafting_decision_desc:0 "雇佣铭文大师，收集锻造手册，练习灵锻阵法，提升你的魔法宝物制作等级。"
 study_magic_treasure_crafting_decision_tooltip:0 "为魔法宝物工匠特性提供升级路径（1 级 -> 2 级 -> 3 级）。"
 study_magic_treasure_crafting_decision_confirm:0 "开始专注于锻造工艺的研究。"

 xianxia_world.1840.t:0 "锻造大厅指导"
 xianxia_world.1840.desc:0 "你在经验丰富的文物精炼师的指导下，花费数月时间学习材料共鸣、铭文分层和精神束缚稳定。"
 xianxia_world.1840.a:0 "我的炼宝之道愈加精进。"
 invite_path_cultivators_decision:0 "邀请修道者"
 invite_path_cultivators_decision_desc:0 "通过客栈、山隘和宗门渠道发出邀请，招募与你修炼道路相同的游方修士成为宫廷勇士。"
 invite_path_cultivators_decision_tooltip:0 "首先邀请你所在教义道路上的现有游方修炼者；只有在没有可用修炼者的情况下才会生成一个。"
 invite_path_cultivators_decision_confirm:0 "寄送招募护身符。"

 xianxia_world.1850.t:0 "道家招募"
 xianxia_world.1850.desc:0 "您的邀请函已在江湖网络中流传。志同道合的游侠或许会响应您的召唤，成为宫廷精英守护者和前线勇士。"
 xianxia_world.1850.a:0 "招募他们成为我道路上的勇士。"
 xianxia_world.1850.b:0 "现在不要。"

 invited_path_guardian:0 "受邀路径守护者"
 invited_path_guardian_desc:0 "这位修仙者响应了道之召唤，如今已成为宫廷中的精英冠军。"
 sect_examination_activity_decision:0 "东道主考试"
 sect_examination_activity_decision_desc:0 "举行正式的宗门考核，根据经脉、血统、体质和境界等因素分级评分。高阶考生从内院开始，低阶考生进入外院。"
 sect_examination_activity_decision_tooltip:0 "拥有天赋经脉和较高血统/体质/境界等级的人会获得录取加成；只有通过门槛的人才能从内院弟子做起。"
 sect_examination_activity_decision_confirm:0 "开放考场。"
 inner_court_promotion_activity_decision:0 "举行内庭晋升"
 inner_court_promotion_activity_decision_desc:0 "经过多年的观察，提拔经过验证的宗门弟子进入内院，在那里他们可以获得受保护的秘籍和更密集的灵气资源。"
 inner_court_promotion_activity_decision_tooltip:0 "启动一项较长冷却期的晋升活动，将顶尖弟子提拔至内院地位。"
 inner_court_promotion_activity_decision_confirm:0 "召开内部法庭审查会议。"
 elder_promotion_activity_decision:0 "召开长老晋升大会"
 elder_promotion_activity_decision_desc:0 "召集宗家和殿主，提升已达到普通长老境界门槛的内部弟子。"
 elder_promotion_activity_decision_tooltip:0 "只有核心形成境界或更高境界的候选人才有资格被任命为长老。"
 elder_promotion_activity_decision_confirm:0 "开始提名长老。"


 xianxia_world.1860.t:0 "宗派门徒分配"
 xianxia_world.1860.desc:0 "长老们会呈上有天赋的未成年弟子名单。你可以正式确定师徒关系，以便未来的神童能在经验丰富的修行者指导下成长。"
 xianxia_world.1860.a:0 "将有天赋的弟子分配给导师指导。"
 xianxia_world.1860.b:0 "推迟作业周期。"

 xianxia_world.1870.t:0 "江湖大会开幕"
 xianxia_world.1870.desc:0 "随着修士、游侠和隐士的到来，各宗门旗帜纷纷升起。如今，评判主办方的标准不再是运气，而是武艺和宗门协调。"
 xianxia_world.1870.a:0 "开启第一阶段。"
 xianxia_world.1870.b:0 "取消聚会。"

 xianxia_world.1871.t:0 "江湖聚会 - 竞争舞台"
 xianxia_world.1871.desc:0 "随着回合的进行，你的指挥威仪和武艺表现将决定宗门是带着更强大的权威离开，还是带着内部的耻辱离开。"
 xianxia_world.1871.a:0 "突破竞争阶段。"

 xianxia_world.1872.t:0 "江湖聚会 - 最终阶段"
 xianxia_world.1872.desc:0 "最后的交流决定了声誉和宗派地位。你的东道主威望也将在这一阶段决出。"
 xianxia_world.1872.a:0 "盛会结束。"

 jianghu_activity_host_momentum:0 "江湖活动势头"
 jianghu_activity_host_momentum_desc:0 "成功举办江湖聚会可以提升道派内部的声望和社会影响力。"
 xianxia_world.1880.t:0 "同道相通之道交流宴会"
 xianxia_world.1880.desc:0 "亭台楼阁如同盛宴般布置妥当，但此次聚会是同道修士们辩论经文含义、突破方法和战斗心得的聚会。"
 xianxia_world.1880.a:0 "开始第一轮交换。"

 xianxia_world.1881.t:0 "道交换完成"
 xianxia_world.1881.desc:0 "经过数天的辩论、演示和人工对比，同路学员带着更深刻的理解和更佳的修炼节奏离开。"
 xianxia_world.1881.a:0 "让洞察力在我们前进的道路上传播。"

 dao_exchange_host_inspiration:0 "道交流主持人灵感"
 dao_exchange_host_inspiration_desc:0 "举办同道相聚的宴席交流活动，提高了这位修行者在同伴中的洞察力和领导能力。"
 dao_exchange_participant:0 "道交流参与者"
 dao_exchange_participant_desc:0 "近期与同道相道的修行者交流，提高了这位修行者的学习节奏和实践理解。"


 activity_jianghu_grand_gathering:0 "江湖盛会"
 activity_jianghu_grand_gathering_desc:0 "汇聚修仙者、对手和宗门代表，举行多阶段江湖峰会，彰显荣耀与实力。"
 jianghu_gathering_phase_arrival:0 "到达"
 jianghu_gathering_phase_sparring:0 "切磋与决斗"
 jianghu_gathering_phase_exchange:0 "道交易所"
 jianghu_gathering_phase_climax:0 "高潮"

 activity_same_path_dao_exchange:0 "同路道交流"
 activity_same_path_dao_exchange_desc:0 "一场遵循教义的交流，修炼者们在此辩论秘籍，统一哲学理念，完善突破。"
 dao_exchange_phase_arrival:0 "到达"
 dao_exchange_phase_discourse:0 "圣经讲道"
 dao_exchange_phase_integration:0 "一体化"

 activity_sect_examination:0 "宗派考试"
 activity_sect_examination_desc:0 "根据经络、血统/体质天赋和修为境界，对申请者进行分级评分，将新兵分入内廷或外廷。"
 activity_sect_examination_host_desc:0 "$BULLET_WITH_TAB$招募有前途的弟子加入你的教派等级制度。\n$BULLET_WITH_TAB$通过严格的选拔来提升教派声望。\n"
 activity_sect_examination_guest_desc:0 "$BULLET_WITH_TAB$在正式的教派考试中竞争认可。\n"
 activity_sect_examination_conclusion_desc:0 "宗派考试已经结束，结果已经公布。"
 activity_sect_examination_selection_tooltip:0 "主持正式会议[GetActivityType('activity_sect_examination').GetNameNoTooltip]."
 activity_sect_examination_destination_selection:0 "选择考生将接受测试的主要教派场地。"
 sect_examination_phase_arrival:0 "候选人到达"
 sect_examination_phase_arrival_desc:0 "候选人向宗派报到，并登记世系、法典和经络记录。"
 sect_examination_phase_assessment:0 "子午线评估"
 sect_examination_phase_assessment_desc:0 "长老们评估流程控制、领域稳定性以及武术基本功。"
 sect_examination_phase_recruitment:0 "招聘仪式"
 sect_examination_phase_recruitment_desc:0 "最终等级确定后，弟子将被分配到内院或外院。"

 xianxia_activity.7300.t:0 "教派考核：抵达"
 xianxia_activity.7300.desc:0 "考生、长者和考官聚集在你的场地，审核注册符咒和经络记录。"
 xianxia_activity.7300.a:0 "打开考场。"

 xianxia_activity.7310.t:0 "部门考试：评估"
 xianxia_activity.7310.desc:0 "候选人在长老们面前展示对经络运行的控制力和对基本修炼法则的理解。"
 xianxia_activity.7310.a:0 "公平地评估每一位竞争者。"

 xianxia_activity.7320.t:0 "宗派考试：招募"
 xianxia_activity.7320.desc:0 "最终排名会根据经脉、血统/体质以及境界等因素获得相应的等级加成。高阶候选人从内院开始，其他人则进入外院成为弟子。"
 xianxia_activity.7320.a:0 "招募最优秀的候选人。"

 activity_inner_court_promotion:0 "内庭晋升"
 activity_inner_court_promotion_desc:0 "正式的考核，对已成名的弟子进行测试和选拔，以获得内院传人资格。"
 activity_inner_court_promotion_host_desc:0 "$BULLET_WITH_TAB$挑选值得接受更深层次传承的弟子\n$BULLET_WITH_TAB$加强宗门内部传承\n"
 activity_inner_court_promotion_guest_desc:0 "$BULLET_WITH_TAB$寻求晋升到宗门核心层。\n"
 activity_inner_court_promotion_conclusion_desc:0 "内廷晋升仪式完成。"
 activity_inner_court_promotion_selection_tooltip:0 "召集[GetActivityType('activity_inner_court_promotion').GetNameNoTooltip] 审查。"
 activity_inner_court_promotion_destination_selection:0 "选择举行内庭审判的大厅。"
 inner_court_promotion_phase_review:0 "记录审查"
 inner_court_promotion_phase_review_desc:0 "族谱、行为和突破性成就都要提交理事会审查。"
 inner_court_promotion_phase_trials:0 "子午线试验"
 inner_court_promotion_phase_trials_desc:0 "候选人将面临气控制测试和教义压力测试。"
 inner_court_promotion_phase_investiture:0 "内庭授职仪式"
 inner_court_promotion_phase_investiture_desc:0 "成功的弟子将获得内院印章。"

 xianxia_activity.7400.t:0 "内庭晋升：回顾"
 xianxia_activity.7400.desc:0 "在宗派讲台上宣读族谱、突破记录和导师报告。"
 xianxia_activity.7400.a:0 "给候选人打电话。"
 xianxia_activity.7410.t:0 "内庭晋升：审判"
 xianxia_activity.7410.desc:0 "候选人通过限制性阵法来传递气，以证明其控制力、耐力和教义纪律。"
 xianxia_activity.7410.a:0 "评判它们的根基。"
 xianxia_activity.7420.t:0 "内廷晋升：授职仪式"
 xianxia_activity.7420.desc:0 "经过慎重考虑，最优秀的弟子会被接纳进入内院，并获得更深层次的传法机会。"
 xianxia_activity.7420.a:0 "提拔最优秀的人。"

 activity_elder_promotion:0 "长老晋升大会"
 activity_elder_promotion_desc:0 "这是一次罕见的宗门大会，领导席位将分配给那些拥有卓越忠诚和深厚修为的高级修士。"
 activity_elder_promotion_host_desc:0 "$BULLET_WITH_TAB$委任有能力的长老来守护你的教派。\n$BULLET_WITH_TAB$塑造你所在教派的长期教义和政治路线。\n"
 activity_elder_promotion_guest_desc:0 "$BULLET_WITH_TAB$竞争长老继承仪式中的认可\n"
 activity_elder_promotion_conclusion_desc:0 "长老晋升大会已作出最终决定。"
 activity_elder_promotion_selection_tooltip:0 "握住[GetActivityType('activity_elder_promotion').GetNameNoTooltip]填补长老席位。"
 activity_elder_promotion_destination_selection:0 "选择举行长老仪式的议事厅。"
 elder_promotion_phase_nominations:0 "提名"
 elder_promotion_phase_nominations_desc:0 "宗门和道场推选候选人填补空缺的长老职位。"
 elder_promotion_phase_assessment:0 "理事会评估"
 elder_promotion_phase_assessment_desc:0 "委员会会权衡修为深度、忠诚度和治理能力。"
 elder_promotion_phase_enthronement:0 "长老登基"
 elder_promotion_phase_enthronement_desc:0 "被选中的候选人将被授予长老印章和正式权力。"

 xianxia_activity.7500.t:0 "长者晋升：提名"
 xianxia_activity.7500.desc:0 "内殿导师和宗门派系提交长老继承人选。"
 xianxia_activity.7500.a:0 "接受正式提名。"
 xianxia_activity.7510.t:0 "老年人晋升：评估"
 xianxia_activity.7510.desc:0 "战斗记录、经文掌握程度和治理行为均由高级仲裁员审查。"
 xianxia_activity.7510.a:0 "对每位候选人进行评估。"
 xianxia_activity.7520.t:0 "长老晋升：登基"
 xianxia_activity.7520.desc:0 "只有达到长老级境界门槛的被提名者才能获得长老印章、殿堂权柄和终身宗门义务。"
 xianxia_activity.7520.a:0 "安装新的长老。"

 xianxia_activity.7100.t:0 "盛大聚会：抵达"
 xianxia_activity.7100.desc:0 "各大宗门长老、游方僧人和竞争对手齐聚一堂，江湖大聚会正式拉开帷幕。"
 xianxia_activity.7100.a:0 "欢迎来到汇聚之路。"

 xianxia_activity.7110.t:0 "大集结：切磋阶段"
 xianxia_activity.7110.desc:0 "决斗场和挑战台决定谁能赢得尊重。你的实力和沉着冷静将决定聚会的基调。"
 xianxia_activity.7110.a:0 "比赛开始。"

 xianxia_activity.7120.t:0 "盛大聚会：交流阶段"
 xianxia_activity.7120.desc:0 "刀剑入鞘，长老和弟子们交流技艺、教义见解和宗派信仰。"
 xianxia_activity.7120.a:0 "巩固这些联盟。"

 xianxia_activity.7130.t:0 "盛大聚会：高潮"
 xianxia_activity.7130.desc:0 "最终的示威游行决定了东道主在江湖地区的声誉。东道主的地位和历史地位就此书写。"
 xianxia_activity.7130.a:0 "确认会议结果。"

 xianxia_activity.7200.t:0 "道交流：抵达"
 xianxia_activity.7200.desc:0 "同路人前来交流经验、探讨瓶颈问题、分享实践突破。"
 xianxia_activity.7200.a:0 "打开交流大厅。"

 xianxia_activity.7210.t:0 "道交流：论述"
 xianxia_activity.7210.desc:0 "经文诠释和修炼理论在相互尊重但又激烈的辩论中受到检验。"
 xianxia_activity.7210.a:0 "携手共进，完善我们的道路。"

 xianxia_activity.7220.t:0 "道交流：整合"
 xianxia_activity.7220.desc:0 "学员们带着更清晰的教义和更强的学习修炼动力离开。"
 xianxia_activity.7220.a:0 "将这些见解传承下去。"

 view_jianghu_strongest_leaderboard_decision:0 "查看江湖最强排行榜"
 view_jianghu_strongest_leaderboard_decision_desc:0 "查看当前通过采集和锦标赛胜利产生的江湖实力等级，包括特定路径的等级。"
 view_jianghu_strongest_leaderboard_decision_tooltip:0 "打开江湖排行榜，查看您按总成绩和路径记录的胜场数。"
 view_jianghu_strongest_leaderboard_decision_confirm:0 "查看排名表。"

 xianxia_world.1891.t:0 "江湖最强排行榜"
 xianxia_world.1891.desc:0 "最新的排名牌在客栈、山门和城中竞技场流传。\n\n#bold Overall Strength Tiers (Prowess-Based):#!\n#emp #1 天下第一：#! top living cultivator with the greatest prowess\n#emp #2 江湖泰坦:#! 24+ prowess\n#emp #3 著名刀锋：#! 18+ prowess\n\n#勇往直前之路冠军要求：#! 18+ prowess within your cultivation path.\n\n#你目前的实力较弱：#! [ROOT.GetProwess]\n#你的名望统计（遗产）：#！[ROOT.Var('jianghu_tourney_wins_total').GetValue]"
 xianxia_world.1891.a:0 "江湖铭记力量。"

 jianghu_rank_overall_1:0 "天下第一"
 jianghu_rank_overall_1_desc:0 "目前在江湖最强棋盘上排名第一，凭借集结和比赛胜利次数最多。"
 jianghu_rank_overall_2:0 "#2 江湖泰坦"
 jianghu_rank_overall_2_desc:0 "目前在江湖最强棋盘上排名第二，凭借集结和比赛胜利次数位居第二。"
 jianghu_rank_overall_3:0 "#3 著名刀锋"
 jianghu_rank_overall_3_desc:0 "目前在江湖最强棋盘上排名第三，凭借集结和比赛胜利次数位列第三。"
 jianghu_rank_path_orthodox_1:0 "东正教道路倡导者"
 jianghu_rank_path_orthodox_1_desc:0 "江湖聚会和比赛中领先的正统派优胜者。"
 jianghu_rank_path_unorthodox_1:0 "非正统道路冠军"
 jianghu_rank_path_unorthodox_1_desc:0 "江湖聚会和比赛中一位出人意料的领先获胜者。"
 jianghu_rank_path_demonic_1:0 "恶魔之路冠军"
 jianghu_rank_path_demonic_1_desc:0 "江湖聚会和比武中领先的魔族冠军。"
 jianghu_rank_path_vagrant_1:0 "流浪之路冠军"
 jianghu_rank_path_vagrant_1_desc:0 "江湖聚会和比武中领先的流浪选手冠军。"

 xianxia_commander_orthodox_guardian:0 "东正教守护者指挥官"
 xianxia_commander_orthodox_guardian_desc:0 "严明的教派教义塑造了这种指挥风格：坚固的防线、稳定的补给和控制地形的作战计划。"
 xianxia_commander_demonic_reaper:0 "恶魔收割者指挥官"
 xianxia_commander_demonic_reaper_desc:0 "残酷的恶魔战争追求的是通过压力和恐怖来取得决定性的胜利，而不是通过旷日持久的消耗战。"
 xianxia_commander_formation_warden:0 "编队守卫指挥官"
 xianxia_commander_formation_warden_desc:0 "对阵法和护符的精通使这位指挥官成为攻城和地形专家，并以预先准备好的阵型为核心。"
 xianxia_commander_sword_duelist:0 "剑士指挥官"
 xianxia_commander_sword_duelist_desc:0 "以剑术为核心的战场指挥强调精准打击和英雄带领的突破。"
 xianxia_commander_spear_vanguard:0 "长矛先锋指挥官"
 xianxia_commander_spear_vanguard_desc:0 "矛形战术强调纪律严明的前线施压、严密的追击纪律和持续的野战阵型。"
 xianxia_commander_vagrant_skirmisher:0 "流浪散兵指挥官"
 xianxia_commander_vagrant_skirmisher_desc:0 "一种以机动后勤、机会主义围攻压力和崎岖路线适应为核心的游击式指挥风格。"
 xianxia_commander_imperial_marshal:0 "帝国元帅司令"
 xianxia_commander_imperial_marshal_desc:0 "帝国教派指挥理论将权威后勤与以控制为中心的作战和有组织的围攻节奏相结合。"

 xianxia_cultivator_champion_protection:0 "耕耘者冠军保护"
 xianxia_cultivator_champion_protection_desc:0 "这支军队仍然拥有一位活跃的指定修仙冠军。普通的部队冲突并不那么重要，因为有这位冠军坐镇战场，掌控战局。"
 xianxia_cultivator_champion_collapse:0 "修仙冠军崩塌"
 xianxia_cultivator_champion_collapse_desc:0 "这边失去了活跃的修仙冠军，战线正在迅速崩溃。"
 xianxia_cultivator_champion_routed:0 "耕耘者冠军溃败"
 xianxia_cultivator_champion_routed_desc:0 "指定的修真冠军已被击败，无法继续战斗，这动摇了盟军的士气。"

 challenge_sect_leader_decision:0 "挑战宗主"
 challenge_sect_leader_decision_desc:0 "借助血脉传承的力量，挑战你宗派现任领袖，争夺教宗宝座。成功可迫使其退位；失败则会让你名誉扫地数十年。"
 challenge_sect_leader_decision_tooltip:0 "挑起一场针对你领主的教派领导权之争。#bold Current Authority (Liege):#! [liege.Var('sect_authority_score').GetValue]"
 challenge_sect_leader_decision_confirm:0 "发放挑战平板电脑。"

 purge_dissenting_elders_decision:0 "清除持不同意见的长老"
 purge_dissenting_elders_decision_desc:0 "在长老集团分裂你的教派之前将其击溃。这样做虽然能带来恐惧和短期服从，但会损害长期信任。"
 purge_dissenting_elders_decision_tooltip:0 "引发长老派系之间的冲突，结果可能是清洗、绥靖或分裂。"
 purge_dissenting_elders_decision_confirm:0 "清除派系腐败。"

 consecrate_sacred_mountain_decision:0 "奉献圣山"
 consecrate_sacred_mountain_decision_desc:0 "将你都城山的灵脉束缚在正式的宗派律法和仪式之下。这能巩固领土权威，并稳定长期发展。"
 consecrate_sacred_mountain_decision_tooltip:0 "为你的首都增加一个持续时间较长的郡县修正值，并改善控制/发展压力。"
 consecrate_sacred_mountain_decision_confirm:0 "祝圣山门。"

 xianxia_sect_conflict.0100.t:0 "长老派系要求让步"
 xianxia_sect_conflict.0100.desc:0 "宗门长老指责你的殿堂徇私舞弊，执行不力。如果你无法解决此事，你的宗门可能会分裂，甚至公开反抗你的权威。\n\n#bold Current Sect Authority:#! [ROOT.Var('sect_authority_score').GetValue]"
 xianxia_sect_conflict.0100.a:0 "发放津贴，安抚长者。"
 xianxia_sect_conflict.0100.b:0 "清除那些叫嚣最厉害的异议者。"
 xianxia_sect_conflict.0100.c:0 "让分裂释放压力。"

 xianxia_sect_conflict.0110.t:0 "山门教派分裂"
 xianxia_sect_conflict.0110.desc:0 "一部分长老和弟子违背戒律，另立门户。这种分裂削弱了你的直接控制，也动摇了修炼的合法性。"
 xianxia_sect_conflict.0110.a:0 "接受分裂，保留核心教派。"
 xianxia_sect_conflict.0110.b:0 "武力镇压叛乱组织。"

 xianxia_sect_conflict.0200.t:0 "挑战授权席位"
 xianxia_sect_conflict.0200.desc:0 "你可以挑战[scope:sect_leader_target.GetTitledFirstName]对于宗派领导权而言，长老和宗族集团会支持实力、谋略和政治势头。"
 xianxia_sect_conflict.0200.a:0 "在长老面前公开挑战。"
 xianxia_sect_conflict.0200.b:0 "还没到时候。我的机会终会到来。"

 xianxia_sect_conflict.0210.t:0 "教派领袖之争"
 xianxia_sect_conflict.0210.desc:0 "挑战的旗帜高高飘扬。一方将赢得民意授权的席位；另一方将背负数十年的耻辱或复仇的阴影。"
 xianxia_sect_conflict.0210.a:0 "让上天来评判这场比赛。"

 xianxia_sect_conflict.0220.t:0 "你夺取了授权席位"
 xianxia_sect_conflict.0220.desc:0 "你的挑战成功了。老统治者被迫退居幕后，扮演次要的长者角色，而你的权威则重塑了朝廷的忠诚体系和继承预期。"
 xianxia_sect_conflict.0220.a:0 "从今以后，本宗派将遵循我的律法。"

 xianxia_sect_conflict.0230.t:0 "你的挑战已被粉碎"
 xianxia_sect_conflict.0230.desc:0 "你的主张失败了。敌对的长老们把你当作前车之鉴，你在江湖圈的声望也随之崩塌。"
 xianxia_sect_conflict.0230.a:0 "我暂时忍受着这种屈辱。"

 sect_authority_high:0 "高级教派权威"
 sect_authority_high_desc:0 "这位领袖拥有广泛的教派合法性，能够使各个传承谱系保持一致。"
 sect_authority_low:0 "低级教派权威"
 sect_authority_low_desc:0 "这位领导人的授权受到长老和宗族集团的质疑，导致内部分裂加剧。"
 sect_elder_faction_pressure:0 "长老派系压力"
 sect_elder_faction_pressure_desc:0 "相互竞争的老牌势力集团正在争取相互竞争的继承人、特权和政策诉求。"
 sect_schism_recent:0 "近期教派分裂"
 sect_schism_recent_desc:0 "一个从该宗派分裂出来的分支，破坏了宗派的凝聚力和王国的稳定。"
 sect_purge_aftermath:0 "清洗后的余波"
 sect_purge_aftermath_desc:0 "异议遭到残酷镇压，加剧了恐惧，但也毒害了内部信任。"
 sect_lineage_backed_heir:0 "血统显赫的继承人"
 sect_lineage_backed_heir_desc:0 "目前，一个强大的宗族集团支持这位修炼者，以应对未来的领导权之争。"
 sect_challenger_glory:0 "宗门挑战者的荣耀"
 sect_challenger_glory_desc:0 "这位修仙者赢得了领导权挑战赛，现在拥有压倒性的宗门势力。"
 sect_challenger_disgraced:0 "蒙羞的挑战者"
 sect_challenger_disgraced_desc:0 "领导权挑战失败，摧毁了这位修仙人的声望和政治资本。"
 sect_forced_abdication_shame:0 "被迫退位的耻辱"
 sect_forced_abdication_shame_desc:0 "这位前教派领袖在一次权力挑战中被公开罢免。"
 sect_exiled_elder:0 "流放长老"
 sect_exiled_elder_desc:0 "这位长老是在宗门内部清洗和派系清洗中被驱逐的。"

 sacred_mountain_consecrated:0 "圣山"
 sacred_mountain_consecrated_desc:0 "宗派仪式稳定了这座山的灵脉，提高了当地的秩序和修炼效率。"
 spirit_vein_secured:0 "安全灵脉"
 spirit_vein_secured_desc:0 "稳定的宗派治理保障了地方精神脉络的纪律和军事准备。"
 spirit_vein_contested:0 "争夺中的灵脉"
 spirit_vein_contested_desc:0 "敌对宗门的压力和内部不稳定正在扰乱灵脉的控制。"
 corrupted_spirit_vein:0 "腐化灵脉"
 corrupted_spirit_vein_desc:0 "当地精神氛围不稳定且受到污染，滋生阴谋和混乱。"

 establish_sect_branch_hall_decision:0 "建立宗派分堂"
 establish_sect_branch_hall_decision_desc:0 "在你的领地内某郡县建立了一个分堂，以巩固当地教派的影响力和长期的精神脉络纪律。"
 establish_sect_branch_hall_decision_tooltip:0 "选择有效的领域县，并授予有保障的精神脉络利益、发展增长和控制支持。"
 establish_sect_branch_hall_decision_confirm:0 "建立分会会馆。"

 corrupt_spirit_vein_decision:0 "腐化灵脉"
 corrupt_spirit_vein_decision_desc:0 "用禁忌手段扭曲首都的精神流动。这会助长强制政治，但会破坏县域秩序。"
 corrupt_spirit_vein_decision_tooltip:0 "邪恶/非正统的统治者可以将稳定的灵脉控制转变为腐败模式。"
 corrupt_spirit_vein_decision_confirm:0 "任由腐败蔓延。"

 enforce_high_realm_submission_decision:0 "强制高界臣服"
 enforce_high_realm_submission_decision_desc:0 "展现压倒性的实力，让弱小的统治者和朝臣臣服于你的修为等级制度。"
 enforce_high_realm_submission_decision_tooltip:0 "对封臣和耕耘者廷臣施加长期的臣服/顺从效果。"
 enforce_high_realm_submission_decision_confirm:0 "跪拜在更高的天国面前。"

 xianxia_sect_conflict.0300.t:0 "首都灵脉大赛"
 xianxia_sect_conflict.0300.desc:0 "敌对教派的代理人和内部异议分子正在争夺你首都的精神命脉。如果不加以遏制，你对郡县的控制和教派的权威将会削弱。"
 xianxia_sect_conflict.0300.a:0 "部署长者镇压异己。"
 xianxia_sect_conflict.0300.b:0 "撤出并转移到其他地方巩固势力。"

 high_realm_mandate_presence:0 "高领域授权存在"
 high_realm_mandate_presence_desc:0 "统治者压倒性的修为境界对整个朝廷和诸侯体系都产生了政治影响。"
 high_realm_suppressed_vassal:0 "被高阶存在压制"
 high_realm_suppressed_vassal_desc:0 "这位统治者是在远比他强大的修真者势力的阴影下行事的。"
 high_realm_court_deference:0 "法院对上级领域的尊重"
 high_realm_court_deference_desc:0 "这位修仙者压制了围绕在一位高境界君主周围的独立言论。"
 opinion_high_realm_submission:0 "强制高阶臣服"

 view_xianxia_state_status_decision:0 "查看仙侠状态报告"
 view_xianxia_state_status_decision_desc:0 "查看您当前的境界/修为状态，包括权威、冷却时间和领土压力状态。"
 view_xianxia_state_status_decision_tooltip:0 "打开一份易于阅读的种植、宗派、县、州跟踪状态报告。"
 view_xianxia_state_status_decision_confirm:0 "打开报表编辑器。"

 xianxia_sect_succession.0010.t:0 "教派继承危机"
 xianxia_sect_succession.0010.desc:0 "你的继承权受到长老、宗族和投机者的争夺。任何宗派的领导权交接都不可能和平进行。\n\n#bold Sect Authority:#! [ROOT.Var('sect_authority_score').GetValue]"
 xianxia_sect_succession.0010.a:0 "我会挺过这场风暴。"

 xianxia_sect_succession.0015.t:0 "领导真空"
 xianxia_sect_succession.0015.desc:0 "没有稳定的继承人。长老们强行达成紧急协议，以防止宗门立即崩溃。"
 xianxia_sect_succession.0015.a:0 "安装应急试剂。"

 xianxia_sect_succession.0020.t:0 "长老政变"
 xianxia_sect_succession.0020.desc:0 "长辈们拒绝继承你的遗产，并强迫你通过政变完成权力交接。"
 xianxia_sect_succession.0020.a:0 "授权是从我的生产线上窃取的。"

 xianxia_sect_succession.0030.t:0 "教派分裂"
 xianxia_sect_succession.0030.desc:0 "宗门分裂，弟子叛逃，你的宗派分裂成敌对阵营。"
 xianxia_sect_succession.0030.a:0 "稳定剩余部分。"

 xianxia_sect_succession.0040.t:0 "索赔人民事冲突"
 xianxia_sect_succession.0040.desc:0 "一个声索集团拒绝接受你的领导，并开始组织长期的派系压力。"
 xianxia_sect_succession.0040.a:0 "那就让他们来吧。"

 xianxia_sect_succession.0900.t:0 "仙侠状态报告"
 xianxia_sect_succession.0900.desc:0 "#bold Cultivation/Sect State:#!\n教派权威评分：[ROOT.Var('sect_authority_score').GetValue]\n江湖获胜（总计）： [ROOT.Var('jianghu_tourney_wins_total').GetValue]\n江湖获胜（东正教）：[ROOT.Var('jianghu_tourney_wins_orthodox').GetValue]\n江湖获胜（非正统）：[ROOT.Var('jianghu_tourney_wins_unorthodox').GetValue]\n江湖胜（魔）： [ROOT.Var('jianghu_tourney_wins_demonic').GetValue]\n江湖赢了（流浪者）：[ROOT.Var('jianghu_tourney_wins_vagrant').GetValue]\n\n#bold Status Checklist (manual read):#!\n检查您是否拥有[GetModifier('sect_succession_crisis').GetNameWithTooltip], [GetModifier('sect_claimant_faction_pressure').GetNameWithTooltip]， 或者 [GetModifier('high_realm_mandate_presence').GetNameWithTooltip].\n- 查看您所在的首府县[GetModifier('sacred_mountain_consecrated').GetNameWithTooltip], [GetModifier('spirit_vein_secured').GetNameWithTooltip], [GetModifier('spirit_vein_contested').GetNameWithTooltip], [GetModifier('corrupted_spirit_vein').GetNameWithTooltip].\n- 查看工具提示中的标志/冷却时间，包括突破资源冷却时间、高级领域提交冷却时间和狐狸暴露时间。"
 xianxia_sect_succession.0900.a:0 "关闭报告。"

 sect_succession_crisis:0 "教派继承危机"
 sect_succession_crisis_desc:0 "该教派的继承权正受到其他派系和继承人的激烈争夺。"
 sect_claimant_faction_pressure:0 "索赔方派系压力"
 sect_claimant_faction_pressure_desc:0 "一个声称拥有圣权的团体正在巩固力量，反对现任教派领导层。"
 sect_failed_heir_exile:0 "流亡中的失败继承人"
 sect_failed_heir_exile_desc:0 "一位继承权争夺失败者已被排挤出正统权力结构。"
 sect_lineage_betrayal:0 "血统背叛"
 sect_lineage_betrayal_desc:0 "受信任的血统集团背叛了预期的继承顺序。"
 sect_coup_victor:0 "政变胜利者"
 sect_coup_victor_desc:0 "这位农夫在继承危机期间通过政变政治崛起。"
 sect_emergency_regent:0 "紧急教派摄政王"
 sect_emergency_regent_desc:0 "安装临时代理人是为了防止继承权崩溃后彻底垮台。"

#fox
 ks_cultivation_decision:0 "灵魂融合"
 ks_cultivation_decision_desc:0 "你的灵魂已经足够强大，可以尝试与你的肉身进一步融合。"
 ks_cultivation_decision_tooltip:0 "尝试与你的人体融合。\n\n#high Cost:#！150 声望\n#high Cooldown:#尝试三年后"
 ks_cultivation_decision_confirm:0 "开始灵魂融合仪式"
 
 xianxia_world.9650.t:0 "融合仪式"
 xianxia_world.9650.desc:0 "在月光的掩护下，你准备着那禁忌的仪式。你尾状的精气如丝链般缠绕着选定的人类容器。随着你的真气涌入，他们的身体颤抖不已——这真气预示着愉悦、力量和永恒的结合。\n\n凡人的灵魂会屈服于你迷人的拥抱，还是会抗拒它？"
 xianxia_world.9650.a:0 "命运决定一切！"
 xianxia_world.9650.b:0 "命运决定一切！"

 # Success Event
 xianxia_world.9651.t:0 "完美融合达成！"
 xianxia_world.9651.desc:0 "幸福的合一感席卷而来。人类的记忆、修为和肉身，如今都归你所有。你的新形态散发着无法抗拒的魅力——凡人只需一眼便会跪倒在地，乞求献出真元，与你进行双修。\n你披着人皮，是完美的捕食者。"
 xianxia_world.9651.a:0 "这艘船真是精美绝伦……"

 # Failure Event
 xianxia_world.9652.t:0 "整合受阻"
 xianxia_world.9652.desc:0 "人魂奋力反抗，排斥你的气。融合仪式在一阵混乱的能量爆发中崩溃瓦解。你被迫变回灵体，虚弱而沮丧。\n\n船只的阻力只会让你更加渴望他们的身体……"
 xianxia_world.9652.a:0 "猎物还在抵抗……至少目前如此。"

 # Optional flavor variants (you can expand the chain)
 xianxia_world.9650.c:0 "先用幻术削弱他们的意志。"
# Casus Belli Name
 xianxia_avenge_sect_insult_cb:0 "复仇教派的侮辱"
 xianxia_avenge_sect_insult_cb_desc:0 "这 [Root.GetSectName]受到了严重的侮辱[Target.GetSectName]我们必须宣战，以恢复我们教派的荣誉，并迫使他们的首领羞愧地退位。"

 # War Names
 XIANXIA_AVENGE_SECT_INSULT_WAR_NAME:0 "[attacker.GetSectName]为遭受的严重侮辱进行报复[attacker.GetSectName]"
 XIANXIA_AVENGE_SECT_INSULT_WAR_NAME_BASE:0 "复仇教派的侮辱"
 XIANXIA_AVENGE_SECT_INSULT_WAR_NAME_FALLBACK:0 "复仇教派的侮辱"

 # Custom Descriptions (for allowed_for / allowed_against)
 xianxia_no_sect_revenge_target:0 "你现在还不能使用这个战争理由。"

 # Victory / Peace / Defeat Descriptions
 xianxia_avenge_sect_insult_victory_desc_attacker:0 "我们成功地为宗派报了仇！敌方首领被迫羞愧地退位，恢复了我们的荣誉。"
 xianxia_avenge_sect_insult_victory_desc_defender:0 "我们教派战败蒙羞，首领被迫耻辱退位。"
 xianxia_avenge_sect_insult_victory_desc:0 "受辱的教派取得了胜利。冒犯者的首领被迫退位。"

 xianxia_avenge_sect_insult_white_peace_desc_defender:0 "因教派侮辱而引发的战争以和平告终。但荣誉仍未得到满足。"
 xianxia_avenge_sect_insult_white_peace_desc:0 "因教派侮辱而引发的冲突最终以双方均未获胜告终。"

 xianxia_avenge_sect_insult_defeat_desc_attacker:0 "我们为宗派的侮辱复仇的尝试失败了。我们失去了威望，荣誉也蒙受了玷污。"
 xianxia_avenge_sect_insult_defeat_desc:0 "为宗门受辱而复仇的人已被击败。"

 # Invalidated CB description
 xianxia_cb_invalidated_desc:0 "战争理由不再成立——要么目标已不在战场上，要么攻击者不再有资格进行报复。"

 # Optional: If you want a more flavorful tooltip for the CB itself
 xianxia_avenge_sect_insult_cb_tooltip:0 "向对方宗门宣战，为宗门遭受的严重侮辱复仇，并迫使冒犯宗门的宗主羞愧地退位。"
