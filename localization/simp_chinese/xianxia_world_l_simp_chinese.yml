 establish_heavenly_mandate_bureau_decision:0 "建立天命局"
 establish_heavenly_mandate_bureau_decision_desc:0 "凭借皇室的旨意和汉族腹地的合法性，在皇室的庇护下，正式建立一个正统教派。"
 establish_heavenly_mandate_bureau_decision_tooltip:0 "仅限汉族统治者或e_china持有者；将信仰转为天命局。"
 establish_heavenly_mandate_bureau_decision_confirm:0 "将宗派与帝国紧密结合。"

 orthodox_alliance_leader:0 "东正教联盟领袖"
 orthodox_alliance_leader_desc:0 "被正统教派公认为正统秩序的首要捍卫者。"
 demonic_alliance_leader:0 "恶魔联盟首领"
 demonic_alliance_leader_desc:0 "在魔道各派系中，他作为主导力量而令人畏惧并被服从。"
 unorthodox_alliance_leader:0 "非正统联盟领袖"
 unorthodox_alliance_leader_desc:0 "被公认为异端教派和游方学派中的战略领袖。"
 martial_alliance_leader:0 "武术联盟领袖"
 martial_alliance_leader_desc:0 "这位统治者统领着庞大的江湖联盟体系和仲裁秩序。"
