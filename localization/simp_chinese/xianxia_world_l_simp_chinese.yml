 XIANXIA_DESTROY_SECT_FOUNDATION_WAR_NAME:0 "摧毁教派基金会"
 XIANXIA_DESTROY_SECT_FOUNDATION_WAR_NAME_BASE:0 "基金会战争"
 xianxia_destroy_sect_foundation_victory_desc:0 "[defender.GetShortUIName|U]的根基已经破碎，他们的遗产正在崩塌。"
 xianxia_destroy_sect_foundation_victory_desc_attacker:0 "你摧毁了……的基础[defender.GetShortUINamePossessive]节"
 xianxia_destroy_sect_foundation_victory_desc_defender:0 "你们宗门的根基已经动摇，陷入混乱。"
 xianxia_destroy_sect_foundation_white_peace_desc:0 "两个宗派都没能摧毁对方的根基。"
 xianxia_destroy_sect_foundation_white_peace_desc_defender:0 "你的教派在冲突中幸存了下来。"
 xianxia_destroy_sect_foundation_defeat_desc:0 "[defender.GetShortUIName|U]保护它们的根基。"
 xianxia_destroy_sect_foundation_defeat_desc_attacker:0 "你未能摧毁他们的宗派根基。"

