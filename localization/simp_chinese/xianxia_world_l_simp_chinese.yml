 proclaim_unorthodox_alliance_leader_decision:0 "宣告非正统联盟领导层"
 proclaim_unorthodox_alliance_leader_decision_desc:0 "将四处游荡、不拘一格的学派聚集起来，组成一个灵活的、非正统的联盟，归你指挥。"
 proclaim_unorthodox_alliance_leader_decision_tooltip:0 "创建一个正式的非正统联盟，并通过适应能力和狡诈手段夺取领导地位。"
 proclaim_unorthodox_alliance_leader_decision_confirm:0 "让非传统的旗帜高高飘扬。"

