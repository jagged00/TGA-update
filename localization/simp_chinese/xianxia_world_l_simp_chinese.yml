opinion_fox_spirit_mortal_hunter:0 "猎杀凡人以求修炼"

xianxia_world.2260.t:0 "捕食者的誓言"
xianxia_world.2260.desc:0 "你不再压抑狐妖之血的渴望。凡人的精华化作燃料，你的道路也因此变得黑暗。"
xianxia_world.2260.a:0 "我接受捕食之道。"

xianxia_world.2261.t:0 "月光下的生死狩猎"
xianxia_world.2261.desc:0 "夜幕掩护下，你在自己的领地中收割凡人的生命力。力量涌动，但谣言却像野火般蔓延。"
xianxia_world.2261.a:0 "让恐惧指引我的道路。"

 declare_heavenly_demon_decision:0 "自称天上的恶魔"
 declare_heavenly_demon_decision_desc:0 "你们的宗门已征服天下足够多的疆域，足以建立帝国。宣告你们的统治，让江湖承认你们魔族的至高地位吧！"
 declare_heavenly_demon_decision_tooltip:0 "需要天魔宗和帝国规模的征服。可永久提升同信仰势力的好感度，并大幅提升修炼学习动力。"
 declare_heavenly_demon_decision_confirm:0 "让天下万民都见证天魔的威严。"

 heavenly_demon_proclaimed:0 "天魔宣称"
 heavenly_demon_proclaimed_desc:0 "征服了庞大的帝国疆域后，这位统治者颁布了天魔诏令。宗门同僚们既敬畏又恐惧，修炼见识也随之加速。"


 proclaim_great_sect_hegemon_decision:0 "宣告大宗派霸权"
