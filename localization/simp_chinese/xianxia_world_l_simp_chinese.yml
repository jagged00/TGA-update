 xianxia_world.1800.desc:0 "你打开锻造大厅，调整灵火与你的经脉节奏。铭文笔刷、淬魂矿石和血缚催化剂被排列成同心圆状。\n\n#bold Craftable Treasure Pool:#!\n• 天裂之刃\n• 灵魂束缚葫芦\n• 九龙鼎\n• 虚空步靴\n• 星陨护符\n• 真心之镜\n• 雷霆密封手镯\n• 翡翠莲花长袍\n•昆仑山砚台\n• 祖先精神旗帜\n\n你的宝物匠等级将决定精炼质量和锻造节奏。"
