# ==================== ORTHODOX SECT EXPANSION ====================
 XIANXIA_ORTHODOX_SECT_EXPANSION_WAR_NAME:0 "天命：东正教净化运动"
 XIANXIA_ORTHODOX_SECT_EXPANSION_WAR_NAME_BASE:0 "东正教净化运动"

 xianxia_orthodox_sect_expansion_victory_desc_attacker:0 "在上天的旨意下，[defender.GetTitleName]已被净化。异端邪说已被真正的正统教化彻底粉碎。"
 xianxia_orthodox_sect_expansion_victory_desc_defender:0 "正统教派带着天命降临，将我们的耕作方式斥为异端邪说，并夺取了我们的土地。"
 xianxia_orthodox_sect_expansion_victory_desc:0 "正统教派通过征服来推行天道。"

# ==================== UNORTHODOX SECT EXPANSION ====================
 XIANXIA_UNORTHODOX_SECT_EXPANSION_WAR_NAME:0 "反叛天堂：非正统统治征服"
 XIANXIA_UNORTHODOX_SECT_EXPANSION_WAR_NAME_BASE:0 "非正统统治征服"

 xianxia_unorthodox_sect_expansion_victory_desc_attacker:0 "正统观念的僵化枷锁已被打破。[defender.GetTitleName]现在，它屈服于我们自由、无拘无束的非正统道路。"
 xianxia_unorthodox_sect_expansion_victory_desc_defender:0 "这些不按常理出牌的恶魔竟敢违抗上天的旨意，将我们的领土据为己有。"
 xianxia_unorthodox_sect_expansion_victory_desc:0 "非正统教派通过挑战天律开辟了新的领地。"

# ==================== DEMONIC SECT EXPANSION ====================
 XIANXIA_DEMONIC_SECT_EXPANSION_WAR_NAME:0 "血月升华：恶魔歼灭圣战"
 XIANXIA_DEMONIC_SECT_EXPANSION_WAR_NAME_BASE:0 "恶魔歼灭圣战"

 xianxia_demonic_sect_expansion_victory_desc_attacker:0 "这 [defender.GetTitleName]已被恶魔的力量吞噬。他们的灵魂脉络如今在永恒的腐化中哀嚎。"
 xianxia_demonic_sect_expansion_victory_desc_defender:0 "恶魔如同血月般降临，屠杀我们的信徒，玷污我们的圣地。"
 xianxia_demonic_sect_expansion_victory_desc:0 "魔教派系掀起了一场恐怖与腐败的统治。"

