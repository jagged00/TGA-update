 prince_jianghu.1000.t:0 "Discipline Before Force"
 prince_jianghu.1000.desc:0 "The morning begins with repeated forms and corrected breath. No crowd gathers, no banner is raised, and that is the point."
 prince_jianghu.1000.a:0 "The road starts under the feet."
 prince_jianghu.1001.t:0 "A Challenge on the Road"
 prince_jianghu.1001.desc:0 "A local name tests yours. There is no need for death or drama; even a measured exchange can travel far."
 prince_jianghu.1001.a:0 "Meet the challenge cleanly."
 prince_jianghu.1001.b:0 "Let humility carry the lesson."
 prince_jianghu.1002.t:0 "The Master's Correction"
 prince_jianghu.1002.desc:0 "The master says little. A foot shifts, a wrist lowers, and suddenly an old mistake becomes obvious."
 prince_jianghu.1002.a:0 "Small corrections become large victories."
 prince_jianghu.1003.t:0 "Quiet Breath"
 prince_jianghu.1003.desc:0 "Noise falls away. Ambition remains, but it no longer needs to shout."
 prince_jianghu.1003.a:0 "Return with steadier hands."
 prince_jianghu.1004.t:0 "Weapon Forms"
 prince_jianghu.1004.desc:0 "The weapon is not a symbol today. It is weight, angle, timing, and repetition."
 prince_jianghu.1004.a:0 "Practice until the motion is honest."
 prince_jianghu.1100.t:0 "Service and Discipline"
 prince_jianghu.1100.desc:0 "Military service turns scattered talent into routine. The road remains open, but duty has its own lessons."
 prince_jianghu.1100.a:0 "Discipline has a language of its own."
 prince_jianghu.1101.t:0 "Field Assignment"
 prince_jianghu.1101.desc:0 "Field duty strips away comfortable theories. Weather, distance, and tired soldiers teach quickly."
 prince_jianghu.1101.a:0 "Learn where plans meet mud."
 prince_jianghu.1102.t:0 "Training Ground"
 prince_jianghu.1102.desc:0 "The troops do not need speeches. They need clear signals, repeated drills, and officers who notice mistakes early."
 prince_jianghu.1102.a:0 "Keep the line steady."
 prince_jianghu.1103.t:0 "Officer Network"
 prince_jianghu.1103.desc:0 "Useful officers are not always loud. Some are found beside ledgers, supply carts, watchfires, and drill yards."
 prince_jianghu.1103.a:0 "Remember the capable."
 prince_jianghu.1104.t:0 "Campaign Notes"
 prince_jianghu.1104.desc:0 "Routes, provisions, morale, and messenger discipline decide more battles than pride admits."
 prince_jianghu.1104.a:0 "Study the unglamorous truths."
 prince_jianghu.1200.t:0 "Service at Court"
 prince_jianghu.1200.desc:0 "Court service requires posture, patience, and the discipline to let others speak first."
 prince_jianghu.1200.a:0 "Serve without surrendering yourself."
 prince_jianghu.1201.t:0 "Strategic Counsel"
 prince_jianghu.1201.desc:0 "Your counsel favors timing, restraint, and preparedness over loud promises."
 prince_jianghu.1201.a:0 "Offer what is useful."
 prince_jianghu.1202.t:0 "Quiet Connections"
 prince_jianghu.1202.desc:0 "A clerk's memory, an officer's trust, and a steward's warning can be worth more than a public boast."
 prince_jianghu.1202.a:0 "Build the quiet network."
 prince_jianghu.1203.t:0 "Formal Recognition"
 prince_jianghu.1203.desc:0 "Recognition arrives without binding your story to a single throne. Reputation can serve the sandbox without becoming a chain."
 prince_jianghu.1203.a:0 "Accept the recognition."
 prince_jianghu.1300.t:0 "The Wandering Road"
 prince_jianghu.1300.desc:0 "Every road has teachers: an innkeeper's warning, a soldier's limp, a shrine's silence, a rival's stare."
 prince_jianghu.1300.a:0 "Keep walking."
 prince_jianghu.1301.t:0 "Officer Drill"
 prince_jianghu.1301.desc:0 "Officers learn to command before chaos arrives. Signals, reserves, and calm voices matter."
 prince_jianghu.1301.a:0 "Drill the habits that survive fear."
 prince_jianghu.1302.t:0 "Campaign Staff"
 prince_jianghu.1302.desc:0 "A general's confidence should be built from reports, reserves, and alternatives, not vanity."
 prince_jianghu.1302.a:0 "Prepare before banners move."
 prince_jianghu.1303.t:0 "Strategist's Web"
 prince_jianghu.1303.desc:0 "A strategist listens for contradiction. The map is useful, but the people who crossed the ground know where it lies."
 prince_jianghu.1303.a:0 "Compare every report."
 prince_jianghu.1304.t:0 "A Disciple's Question"
 prince_jianghu.1304.desc:0 "Teaching another reveals the places where your own certainty has become lazy."
 prince_jianghu.1304.a:0 "Teach, and learn again."
 prince_jianghu.1305.t:0 "Honor Challenge"
 prince_jianghu.1305.desc:0 "A public challenge can become a wound, a lesson, or a reputation. You choose how sharply to answer."
 prince_jianghu.1305.a:0 "Answer with disciplined force."
 prince_jianghu.1305.b:0 "Yield the stage, keep the lesson."
