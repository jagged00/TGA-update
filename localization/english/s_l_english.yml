l_english:
 # ============================================================
 # 500: THE OPENER
 # ============================================================
 iti_event.500.opening: "To [ROOT.Char.GetFirstNameNoTooltip], beneath Heaven,"
 iti_event.500.desc: "This venerable one has received a jade slip bearing your aura. Within, an illusion depicts me in disgrace, slandering even my honored parents. Such audacity shakes the heavens. Surely this is a deviation of the heart—explain yourself before your karma ripens."
 iti_event.500.a: "Let this venerable one enlighten the [iti_insult_ruler.GetDynastyName] on the Dao of humiliation."
 iti_event.500.desc_family: "I know not what inner demons drove you to such provocation, but retract your words and sever this karmic entanglement, lest both our bloodlines suffer beneath Heaven. We share the same ancestral roots, after all."
 iti_event.500.b: "This junior swears upon Heaven—it was not me!"
 iti_event_500_reply_tt: "Karmic threads begin to intertwine..."
 iti_event_500_disregard_tt: "You cast the matter aside like drifting dust."
 iti_insult_escalation_tt: "Heavenly consequences may descend."

 # ============================================================
 # 1000 SERIES: THE INITIAL INSULT
 # ============================================================
 iti_event.1000.opening: "To the [ROOT.Char.Custom('InsultAdjective')] [ROOT.Char.GetTitledFirstName], an ant beneath Heaven,"

 iti_event.1000.desc_standard: "You, a mere [ROOT.Char.Custom2('InsultNoun', ROOT.Char)]. All beneath Heaven knows your worth is no greater than that of a [ROOT.Char.Custom2('InsultNoun', ROOT.Char)]. A shameless, lecherous [ROOT.Char.Custom2('InsultNoun', ROOT.Char)]. I wonder how long such a creature can persist before being struck down by righteous retribution."
 iti_event.1000.desc_rival: "Hatred. From the moment this seat beheld your [ROOT.Char.Custom('InsultAdjective')] face, a flame ignited within my dantian. Even if every grain beneath Heaven bore the word 'Hate,' it would not measure even a fraction of what I feel toward the [ROOT.Char.GetDynastyName]—toward you."
 iti_event.1000.desc_family: "I always knew you were a [ROOT.Char.Custom('InsultAdjective')] disgrace, [ROOT.Char.GetFirstNameNoTooltip]. To think we share blood! Our ancestors surely rage in the underworld to see the [ROOT.Char.GetDynasty.GetBaseName] lineage tainted by such a [ROOT.Char.Custom('InsultAdjective')] [ROOT.Char.Custom2('InsultNoun', ROOT.Char)]. You are a stain upon our clan."
 iti_event.1000.desc_negative_opinion: "It is a tragic comedy that a [ROOT.Char.Custom2('InsultNoun', ROOT.Char)] so utterly [ROOT.Char.Custom('InsultAdjective')] has been allowed to stand among the mighty. Fear not—Heaven has a way of cleansing such filth, and your time for retribution draws near, you [ROOT.Char.Custom('InsultAdjective')] [ROOT.Char.Custom2('InsultNoun', ROOT.Char)]."

 iti_event.1000.a: "Hmph. Let us see how you respond to this."
 iti_event.1000.a.tt: "You reply with a devastating insult, shaking their spirit. #high Your words cut like blades!#!"
 iti_event.1000.b: "This trivial matter is beneath my notice."
 iti_event.1000.b.tt: "You refuse to dignify the insult."

 iti_event.1001.opening: "To my most... [ROOT.Char.Custom('InsultAdjective')] neighbor,"
 iti_event.1001.desc: "A jade slip arrived today, foul in both scent and intent. Its aura alone offends. This one debates whether it is even worth reading."
 iti_event.1001.a: "I will not lower myself to respond."

 # ============================================================
 # 3000 SERIES: THE RESPONSE
 # ============================================================
 iti_event.3000.opening: "To the [ROOT.Char.Custom2('InsultNoun', ROOT.Char)] [ROOT.Char.GetTitledFirstName],"
 iti_event.3000.desc: "You dare speak thus to this venerable one, you insignificant [ROOT.Char.Custom2('InsultNoun', ROOT.Char)]? Know that I have stood at the peak of my domain and crushed countless foes. Your kind would not survive a single breath of my killing intent."
 iti_event.3000.desc_dead: "The one you seek has already returned to the cycle of reincarnation. Their hatred perished with them."

 iti_event.3000.a_lifestyle_diplomat: "To the [ROOT.Char.Custom('InsultAdjective')] [ROOT.Char.Custom2('InsultNoun', ROOT.Char)] [iti_insult_ruler.GetTitledFirstName]..."
 iti_event.3000.a_lifestyle_general: "That [ROOT.Char.Custom2('InsultNoun', ROOT.Char)]. I must vent my killing intent before replying."
 iti_event.3000.a_lifestyle_administrator: "Your lineage... reeks of decay."
 iti_event.3000.a_lifestyle_schemer: "I will send something... appropriate along with my reply."
 iti_event.3000.a_lifestyle_scholar: "Your ancestry is as laughable as your cultivation."

 iti_event.3000.a.tt: "You craft a devastating verbal strike."
 iti_event.3000.b: "Attempt to calm the storm."
 iti_event.3000.b.tt: "You attempt to disperse the tension."
 iti_event.3000.c: "Send them a 'gift'."
 iti_event.3000.c.tt: "A humiliating offering is delivered."

 # ============================================================
 # 7000-8000 SERIES
 # ============================================================
 iti_event.7000.opening: "To the [ROOT.Char.Custom('InsultAdjective')] [ROOT.Char.Custom2('InsultNoun', ROOT.Char)] [ROOT.Char.GetTitledFirstName],"
 iti_event.7000.desc: "I hate you. I hate you. I hate you. Your existence defies reason. You are nothing but a [ROOT.Char.Custom2('InsultNoun', ROOT.Char)], a [ROOT.Char.Custom('InsultAdjective')] aberration. May your lineage crumble to dust beneath Heaven."
 iti_event.7000.a: "This is beneath me..."
 iti_event.7000.a.tt: "You withdraw."
 iti_event.7000.b: "You will regret provoking me."
 iti_event.7000.b.tt: "You escalate further. #N Conflict deepens#!."

 iti_event.8000.opening: "To the [ROOT.Char.Custom('InsultAdjective')] [ROOT.Char.Custom2('InsultNoun', ROOT.Char)] [ROOT.Char.GetTitledFirstName],"
 iti_event.8000.desc: "This venerable one will waste no more time on a whelp like you. Crawl away while you still can. Whatever pride you cling to is meaningless beneath Heaven."
 iti_event.8000.a: "So be it."
 iti_event.8000.a.tt: "You feel relief."

 # ============================================================
 # 9000 SERIES
 # ============================================================
 iti_event.9000.opening: "To the [ROOT.Char.Custom('InsultAdjective')] [ROOT.Char.GetTitledFirstName],"
 iti_event.9000.desc: "Your words amuse me.\n\nYou mistake restraint for weakness. One day, when you lie broken upon the earth, you will understand the price of your arrogance. My retribution will descend like heavenly thunder."
 iti_event.9000.a: "This ends now. Prepare the army."
 iti_event.9000.b: "This has gone too far... withdraw."
 iti_event.9000.c: "We settle this with strength."

 # ============================================================
 # TRAVEL THUG EVENTS
 # ============================================================
 iti_travel_thug_event.3000.t: "Victory on the Road"
 iti_travel_thug_event.3000.desc: "The dust settles as [traveling_victim.GetTitledFirstName] crawls across the ground, defeated. Their protectors have fled, and all they possess now belongs to me."
 iti_travel_thug_event.3000.a: "Your wealth is mine by right of strength."
 iti_travel_thug_event.3000.b: "Go… and spread word beneath Heaven of this venerable one’s might!"
 # TOOLTIPS
 iti_travel_thug_event.1000.a.tt: "You will attempt to rob [traveling_victim.GetTitledFirstName] of their possessions through force."
 iti_mugging_win_tt: "You overwhelm the target and their guards with superior strength."
 iti_mugging_loss_tt: "The target’s protectors repel you and force your retreat!"

