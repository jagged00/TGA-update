 iti_secrets.1000.t: "A Dark Reputation"
 iti_secrets.1000.desc: "As I cultivated my presence in silence, [councillor.GetTitledFirstName] approached with unease. 'My lord… word has spread. The realm whispers that you sent men to brutalize [victim.GetTitledFirstName]. Your name inspires… fear.'"
