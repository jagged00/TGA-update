 jdtc_final.3000.t:0 "School Council"
 jdtc_final.3000.desc:0 "The council begins with pride, old stories, and competing memories. It ends only when someone gives the room a calmer shape."
 jdtc_final.3001.t:0 "Rules and Customs"
 jdtc_final.3001.desc:0 "Rules can protect discipline or smother it. The difference is usually clarity."
 jdtc_final.3002.t:0 "Cross-School Exchange"
 jdtc_final.3002.desc:0 "Controlled exchange lets rivals learn without pretending rivalry has vanished."
 jdtc_final.3003.t:0 "Sect Relief"
 jdtc_final.3003.desc:0 "Sect hands can carry food as well as weapons. People remember the difference."
 jdtc_final.3004.t:0 "Archive Watch"
 jdtc_final.3004.desc:0 "Old notes do not shout, but careless loss can start future feuds."
 jdtc_final.3100.t:0 "An Oath Spoken Softly"
 jdtc_final.3100.desc:0 "The oath has no official seal. That is why it matters."
 jdtc_final.3101.t:0 "Old Grievance"
 jdtc_final.3101.desc:0 "An old wound returns, asking whether it still deserves power over the present."
 jdtc_final.3102.t:0 "Rumor of Betrayal"
 jdtc_final.3102.desc:0 "The rumor is useful to someone. That does not make it true."
 jdtc_final.3103.t:0 "Mending a Name"
 jdtc_final.3103.desc:0 "Reputation heals slowly, through acts that are useful before they are admired."
 jdtc_final.3104.t:0 "Debt of Honor"
 jdtc_final.3104.desc:0 "A debt of honor can guide a person without chaining them."
 jdtc_final.3200.t:0 "Frontier Command Council"
 jdtc_final.3200.desc:0 "The best advice is practical enough to survive tired soldiers, missing supplies, and bad weather."
 jdtc_final.3201.t:0 "Logistics Reform"
 jdtc_final.3201.desc:0 "Glory talks about banners. Survival talks about grain, roads, and rest."
 jdtc_final.3202.t:0 "Between Court and Jianghu"
 jdtc_final.3202.desc:0 "The envoy must translate more than words. They must translate suspicion."
 jdtc_final.3203.t:0 "Border Rescue"
 jdtc_final.3203.desc:0 "Rescue work is rarely clean, but it is often the clearest kind of service."
 jdtc_final.3204.t:0 "Commander Rivalry"
 jdtc_final.3204.desc:0 "Two commanders care more about pride than timing. Someone must cool the room."
 jdtc_final.3300.t:0 "Manual Commentary"
 jdtc_final.3300.desc:0 "A careful note can save a future student from a beautiful mistake."
 jdtc_final.3301.t:0 "Forbidden Art Restrained"
 jdtc_final.3301.desc:0 "Power asks to be used. Wisdom asks what it will cost."
 jdtc_final.3302.t:0 "Lineage Clarified"
 jdtc_final.3302.desc:0 "A technique's history can become a bridge or a knife."
 jdtc_final.3303.t:0 "Manual Cycle Complete"
 jdtc_final.3303.desc:0 "Study, practice, warning, and transmission finally form a circle."
 jdtc_final.3400.t:0 "A Steadier Jianghu"
 jdtc_final.3400.desc:0 "The final vanilla-map edition favors a living sandbox over endless escalation."
