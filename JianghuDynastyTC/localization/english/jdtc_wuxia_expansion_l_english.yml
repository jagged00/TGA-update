 jdtc_wuxia.2000.t:0 "Searching for a School"
 jdtc_wuxia.2000.desc:0 "Teachers do not always sit in famous halls. Some are found beside ferry crossings, drill yards, temples, and quiet roadside inns."
 jdtc_wuxia.2000.a:0 "The search begins."
 jdtc_wuxia.2001.t:0 "A Door Opens"
 jdtc_wuxia.2001.desc:0 "Several traditions may accept a disciplined petitioner. None promises an easy road."
 jdtc_wuxia.2002.t:0 "Rules Before Glory"
 jdtc_wuxia.2002.desc:0 "Forms, chores, watches, and corrected posture teach more than romantic stories admit."
 jdtc_wuxia.2003.t:0 "The Master's Advice"
 jdtc_wuxia.2003.desc:0 "The advice is brief, almost disappointingly plain, until practice reveals its weight."
 jdtc_wuxia.2004.t:0 "Senior Rivalry"
 jdtc_wuxia.2004.desc:0 "A senior disciple accepts the test. Pride watches from every corner."
 jdtc_wuxia.2005.t:0 "School Honor Challenged"
 jdtc_wuxia.2005.desc:0 "An insult does not need blood. It needs an answer strong enough to end the laughter."
 jdtc_wuxia.2006.t:0 "Teaching the Juniors"
 jdtc_wuxia.2006.desc:0 "A beginner's mistake makes your own old weakness uncomfortably visible."
 jdtc_wuxia.2007.t:0 "The Inheritor Question"
 jdtc_wuxia.2007.desc:0 "Recognition is not a crown. It is a burden that makes every flaw public."
 jdtc_wuxia.2008.t:0 "Leaving the Gate"
 jdtc_wuxia.2008.desc:0 "The road outside the school gate has not changed, but you have."
 jdtc_wuxia.2010.t:0 "Local Sect Contact"
 jdtc_wuxia.2010.desc:0 "The first conversation is cautious. Nobody admits the real hierarchy at once."
 jdtc_wuxia.2011.t:0 "Oaths and Obligations"
 jdtc_wuxia.2011.desc:0 "A sect offers protection, contacts, and danger. Choose the shape of the obligation."
 jdtc_wuxia.2012.t:0 "Building Influence"
 jdtc_wuxia.2012.desc:0 "Influence grows through small favors, remembered warnings, and knowing who carries messages."
 jdtc_wuxia.2013.t:0 "Faction Tension"
 jdtc_wuxia.2013.desc:0 "Two sides want quiet support before the dispute becomes public."
 jdtc_wuxia.2014.t:0 "Sect Reputation Dispute"
 jdtc_wuxia.2014.desc:0 "A rumor has found eager ears. Reputation needs a careful defense."
 jdtc_wuxia.2015.t:0 "Negotiating Alliance"
 jdtc_wuxia.2015.desc:0 "No one wants to kneel, but everyone sees the value of not fighting alone."
 jdtc_wuxia.2016.t:0 "Internal Rival"
 jdtc_wuxia.2016.desc:0 "A rival tests the limits of patience and authority."
 jdtc_wuxia.2017.t:0 "Elder Test"
 jdtc_wuxia.2017.desc:0 "The elders ask ordinary questions and listen for extraordinary carelessness."
 jdtc_wuxia.2018.t:0 "Challenge to Authority"
 jdtc_wuxia.2018.desc:0 "Leadership inside a sect is rarely clean. Even victory carries suspicion."
 jdtc_wuxia.2100.t:0 "Competing for Standing"
 jdtc_wuxia.2100.desc:0 "The competition is not only strength. It is discipline, reputation, and who remains calm."
 jdtc_wuxia.2101.t:0 "Trust of the Master"
 jdtc_wuxia.2101.desc:0 "Trust arrives slowly, through small proofs repeated without applause."
 jdtc_wuxia.2102.t:0 "Older Voices"
 jdtc_wuxia.2102.desc:0 "An elder's support is never free, but sometimes it is honest."
 jdtc_wuxia.2103.t:0 "Rival Misconduct"
 jdtc_wuxia.2103.desc:0 "The truth is useful. So is timing. The hard part is choosing how much to reveal."
 jdtc_wuxia.2104.t:0 "Quiet Consolidation"
 jdtc_wuxia.2104.desc:0 "Support gathers in side rooms and late conversations."
 jdtc_wuxia.2105.t:0 "Court Patronage"
 jdtc_wuxia.2105.desc:0 "A court patron sees value in disciplined martial people, provided they remain useful."
 jdtc_wuxia.2106.t:0 "Corrupt Official"
 jdtc_wuxia.2106.desc:0 "The evidence is enough to move carefully, not enough to move foolishly."
 jdtc_wuxia.2107.t:0 "Officer Rivalry"
 jdtc_wuxia.2107.desc:0 "Poor command can kill better people. Challenging it requires nerve."
 jdtc_wuxia.2200.t:0 "Wulin Gathering"
 jdtc_wuxia.2200.desc:0 "Fighters, teachers, guards, wanderers, and rivals gather under temporary peace."
 jdtc_wuxia.2201.t:0 "Before the Heroes"
 jdtc_wuxia.2201.desc:0 "The room quiets enough for words to matter."
 jdtc_wuxia.2202.t:0 "School Dispute"
 jdtc_wuxia.2202.desc:0 "Two schools want victory. You offer a way to keep face instead."
 jdtc_wuxia.2203.t:0 "A Treacherous Name"
 jdtc_wuxia.2203.desc:0 "The accusation could protect the Wulin or tear it further apart."
 jdtc_wuxia.2204.t:0 "Martial Alliance"
 jdtc_wuxia.2204.desc:0 "Agreement does not erase rivalry, but it can delay disaster."
 jdtc_wuxia.2205.t:0 "Public Recognition"
 jdtc_wuxia.2205.desc:0 "Praise is useful. It is also a hook for envy."
 jdtc_wuxia.2206.t:0 "A Famous Fighter"
 jdtc_wuxia.2206.desc:0 "The crowd is smaller than the stories will be."
 jdtc_wuxia.2207.t:0 "Tournament Rounds"
 jdtc_wuxia.2207.desc:0 "No bracket needs to be simulated. A few hard exchanges are enough to make a reputation."
 jdtc_wuxia.2208.t:0 "Martial Crisis"
 jdtc_wuxia.2208.desc:0 "A theft, scandal, frontier alarm, and official pressure all demand different forms of courage."
 jdtc_wuxia.2300.t:0 "A Secret Manual"
 jdtc_wuxia.2300.desc:0 "The text is old, partial, and perhaps more dangerous than useful."
 jdtc_wuxia.2301.t:0 "Studying Ancient Lines"
 jdtc_wuxia.2301.desc:0 "Every page offers power, misunderstanding, or injury."
 jdtc_wuxia.2302.t:0 "Damaged Scripture"
 jdtc_wuxia.2302.desc:0 "A missing character can change a method from healing to harm."
 jdtc_wuxia.2303.t:0 "Guarding the Scripture"
 jdtc_wuxia.2303.desc:0 "A manual is not just paper. It is leverage, memory, and temptation."
 jdtc_wuxia.2304.t:0 "Recovered or Stolen"
 jdtc_wuxia.2304.desc:0 "The same act can be called recovery or theft, depending on who tells the story."
 jdtc_wuxia.2305.t:0 "Passing Down Technique"
 jdtc_wuxia.2305.desc:0 "Teaching a secret method is an act of trust and a risk to the future."
 jdtc_wuxia.2306.t:0 "Dangerous Knowledge"
 jdtc_wuxia.2306.desc:0 "Some teachings produce more corpses than heroes."
 jdtc_wuxia.2307.t:0 "Hidden from Rivals"
 jdtc_wuxia.2307.desc:0 "The safest hiding place is never perfectly safe."
 jdtc_wuxia.2400.t:0 "Frontier Pressure"
 jdtc_wuxia.2400.desc:0 "The frontier calls for help, but not every hero answers through official channels."
 jdtc_wuxia.2401.t:0 "Militia Drill"
 jdtc_wuxia.2401.desc:0 "Farmers and guards need signals they can remember under fear."
 jdtc_wuxia.2402.t:0 "Border Counsel"
 jdtc_wuxia.2402.desc:0 "A commander listens because the advice is practical, not flattering."
 jdtc_wuxia.2403.t:0 "Supply Road"
 jdtc_wuxia.2403.desc:0 "Food and medicine are less glorious than banners, and often more important."
 jdtc_wuxia.2404.t:0 "Refugees on the Road"
 jdtc_wuxia.2404.desc:0 "The helpless cannot pay in fame, but the Jianghu remembers mercy."
 jdtc_wuxia.2405.t:0 "Bandits on the Edge"
 jdtc_wuxia.2405.desc:0 "Bandits do not line up for honorable duels. The pursuit is ugly and necessary."
 jdtc_wuxia.2406.t:0 "Heroes for the Realm"
 jdtc_wuxia.2406.desc:0 "Some martial heroes answer the realm. Others answer only the people. Both choices have a cost."
 jdtc_wuxia.2407.t:0 "Duty Debated"
 jdtc_wuxia.2407.desc:0 "Court, sect, people, and ambition each offer a different explanation for the same action."
